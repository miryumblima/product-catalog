const MEDIA_BUCKET = "media";
const isMediaBlobKey = (key) => key.startsWith("media-blob:") || key.startsWith("media-trash-blob:");

function dataUrlToBlob(dataUrl) {
  const [header, base64] = dataUrl.split(",");
  const mimeMatch = header.match(/data:(.*?);base64/);
  const mime = mimeMatch ? mimeMatch[1] : "application/octet-stream";
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

function guessExtension(mime) {
  if (mime.includes("png")) return ".png";
  if (mime.includes("jpeg") || mime.includes("jpg")) return ".jpg";
  if (mime.includes("gif")) return ".gif";
  if (mime.includes("webp")) return ".webp";
  if (mime.includes("pdf")) return ".pdf";
  if (mime.includes("mp4")) return ".mp4";
  if (mime.includes("quicktime")) return ".mov";
  return "";
}

async function storageGet(key) {
  try {
    const { data, error } = await supabaseClient.from("app_kv").select("value").eq("key", key).maybeSingle();
    if (error || !data) return null;
    return { key, value: data.value };
  } catch (e) {
    return null;
  }
}

async function storageSet(key, value) {
  try {
    if (isMediaBlobKey(key)) {
      const parsed = JSON.parse(value);
      let finalUrl = parsed.url;
      if (finalUrl && finalUrl.startsWith("data:")) {
        const blob = dataUrlToBlob(finalUrl);
        const path = key.replace(/:/g, "_") + guessExtension(blob.type);
        const { error: uploadError } = await supabaseClient.storage
          .from(MEDIA_BUCKET)
          .upload(path, blob, { upsert: true, contentType: blob.type });
        if (uploadError) return null;
        const { data: pub } = supabaseClient.storage.from(MEDIA_BUCKET).getPublicUrl(path);
        finalUrl = pub.publicUrl;
      }
      const storedValue = JSON.stringify({ url: finalUrl });
      const { error } = await supabaseClient.from("app_kv").upsert({ key, value: storedValue, updated_at: new Date().toISOString() });
      return error ? null : { key, value: storedValue };
    }
    const { error } = await supabaseClient.from("app_kv").upsert({ key, value, updated_at: new Date().toISOString() });
    return error ? null : { key, value };
  } catch (e) {
    return null;
  }
}

async function storageDelete(key) {
  try {
    const { error } = await supabaseClient.from("app_kv").delete().eq("key", key);
    return error ? null : { key, deleted: true };
  } catch (e) {
    return null;
  }
}

window.storage = { get: storageGet, set: storageSet, delete: storageDelete };

function Combobox({ value, onChange, options, placeholder, inputClassName = "input", onAddNew }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const trimmed = (value || "").trim();
  const filtered = options.filter((o) => o.toLowerCase().includes(trimmed.toLowerCase()) && o !== value);
  const exactMatch = trimmed.length > 0 && options.some((o) => o.toLowerCase() === trimmed.toLowerCase());
  const showAddNew = trimmed.length > 0 && !exactMatch && onAddNew;

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  return (
    <div className="relative" ref={ref}>
      <input
        value={value}
        onChange={(e) => { onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        placeholder={placeholder}
        className={inputClassName}
      />
      {open && (filtered.length > 0 || showAddNew) && (
        <div className="absolute z-10 mt-1 w-full bg-white border border-[#E3DDCC] rounded-lg shadow-md max-h-40 overflow-y-auto">
          {filtered.map((opt) => (
            <button
              key={opt}
              type="button"
              onClick={() => { onChange(opt); setOpen(false); }}
              className="w-full text-left px-3 py-2 text-sm hover:bg-[#FBEEDA] text-[#3F3B34]"
            >
              {opt}
            </button>
          ))}
          {showAddNew && (
            <button
              type="button"
              onMouseDown={(e) => e.preventDefault()}
              onClick={() => { onAddNew(trimmed); setOpen(false); }}
              className={`w-full text-left px-3 py-2 text-sm font-medium text-[#B9924F] hover:bg-[#FBEEDA] transition ${filtered.length > 0 ? "border-t border-[#F0ECE1]" : ""}`}
            >
              + Add new: "{trimmed}"
            </button>
          )}
        </div>
      )}
    </div>
  );
}

      try { const h = await window.storage.get("aster-inv-history-v1", false); if (h?.value) setInventoryHistory(JSON.parse(h.value)); } catch (e) {}
      try { const hi = await window.storage.get("aster-highlights-v1", false); if (hi?.value) setHighlightedIds(new Set(JSON.parse(hi.value))); } catch (e) {}
      // Load media trash and purge anything older than 30 days
      try {
        const tr = await window.storage.get("aster-media-trash-v1", false);
        if (tr?.value) {
          const parsed = JSON.parse(tr.value);
          const cutoff = Date.now() - 30 * 86400000;
          const kept = parsed.filter((t) => t.deletedAt >= cutoff);
          const expired = parsed.filter((t) => t.deletedAt < cutoff);
          // Clean up blob storage for expired entries
          expired.forEach((t) => { window.storage?.delete("media-trash-blob:" + t.id, false).catch(() => {}); });
          if (kept.length !== parsed.length) {
            window.storage?.set("aster-media-trash-v1", JSON.stringify(kept), false).catch(() => {});
          }
          // Load blob data for kept entries — batched, not all-at-once, for
          // the same reason as the main media blob load above.
          const withBlobs = await runBatched(kept, async (t) => {
            try {
              const b = await window.storage.get("media-trash-blob:" + t.id, false);
              return { ...t, blobUrl: b?.value ? JSON.parse(b.value).url : null };
            } catch (e) { return { ...t, blobUrl: null }; }
          });
          setMediaTrash(withBlobs);
        }
      } catch (e) {}
      // Load saved AI-generated content drafts
      try {
        const d = await window.storage.get("aster-ai-drafts-v1", false);
        if (d?.value) setSavedDrafts(JSON.parse(d.value));
      } catch (e) {}
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try { await window.storage.set(PRODUCTS_KEY, JSON.stringify(products), false); } catch (e) {}
    })();
  }, [products, loaded]);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try { await window.storage.set(MEMORY_KEY, JSON.stringify(memory), false); } catch (e) {}
    })();
  }, [memory, loaded]);

  useEffect(() => {
    if (!mediaLoaded) return;
    (async () => {
      try { await window.storage.set(MEDIA_INDEX_KEY, JSON.stringify(mediaIndex), false); } catch (e) {}
    })();
  }, [mediaIndex, mediaLoaded]);

  // Keep the dropdown memory in sync with whatever brands/categories/sizes
  // already exist across products (including the seed data), not just ones
  // typed in going forward.
  useEffect(() => {
    setMemory((prev) => {
      const next = {
        brand: [...(prev.brand || [])],
        category: [...(prev.category || [])],
        size: [...(prev.size || [])],
      };
      let changed = false;
      products.forEach((p) => {
        if (p.brand && !next.brand.includes(p.brand)) { next.brand.push(p.brand); changed = true; }
        if (p.category && !next.category.includes(p.category)) { next.category.push(p.category); changed = true; }
        (p.sizes || []).forEach((s) => {
          if (s.size && !next.size.includes(s.size)) { next.size.push(s.size); changed = true; }
        });
      });
      return changed ? next : prev;
    });
  }, [products]);

  const rememberValue = (field, value) => {
    if (!value || !value.trim()) return;
    setMemory((prev) => {
      if (prev[field] && prev[field].includes(value)) return prev;
      return { ...prev, [field]: [...(prev[field] || []), value] };
    });
  };

  // Category management (gear icon → Manage Categories) — renaming/deleting
  // updates the master list AND every product currently using that category.
  const renameCategory = (oldName, newName) => {
    const trimmed = newName.trim();
    if (!trimmed || trimmed === oldName) return;
    setMemory((prev) => ({
      ...prev,
      category: (prev.category || []).map((c) => (c === oldName ? trimmed : c)),
    }));
    setProducts((prev) => prev.map((p) => (p.category === oldName ? { ...p, category: trimmed } : p)));
    setCategoryFilter((prev) => (prev === oldName ? trimmed : prev));
  };

  const deleteCategoryFromMemory = (name) => {
    setMemory((prev) => ({ ...prev, category: (prev.category || []).filter((c) => c !== name) }));
    setProducts((prev) => prev.map((p) => (p.category === name ? { ...p, category: "" } : p)));
    setCategoryFilter((prev) => (prev === name ? null : prev));
  };

  const kindFromMime = (mime) => {
    if (mime.startsWith("image/")) return "image";
    if (mime.startsWith("video/")) return "video";
    if (mime === "application/pdf") return "pdf";
    return "file";
  };

  const readAsDataURL = (file) =>
    new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

  // Reads dropped/browsed files into preview data URLs only — nothing is
  // saved to the library yet. Used to build the staging queue.
  const readFilesForStaging = async (fileList) => {
    const files = Array.from(fileList || []);
    const results = await Promise.all(
      files.map(async (file) => {
        try {
          const dataUrl = await readAsDataURL(file);
          return {
            tempId: Date.now().toString() + Math.random().toString(36).slice(2),
            kind: kindFromMime(file.type),
            dataUrl,
            fileName: file.name,
            sizeKB: Math.round(file.size / 1024),
            title: file.name.replace(/\.[^/.]+$/, ""),
            type: "",
            source: "",
          };
        } catch (e) {
          console.error("Failed to read file", file.name, e);
          return null;
        }
      })
    );
    return results.filter(Boolean);
  };

  // Commits a batch of staged items (files and/or links) to the shared
  // media library — each item keeps its own Type/Source/Title/Assign-to-product.
  // Uses Promise.all's guaranteed order-preservation (not .push inside the async
  // callback) so results always line up with the original pendingItems array,
  // regardless of which async read finishes first.
  const commitPendingItems = async (pendingItems, onNewIds = null) => {
    if (!pendingItems || pendingItems.length === 0) return;
    const results = await Promise.all(
      pendingItems.map(async (p) => {
        const id = Date.now().toString() + Math.random().toString(36).slice(2);
        let newItem, blobData = null;
        if (p.kind === "link") {
          newItem = { id, kind: "link", type: p.type || "", title: p.title || "", source: p.source || "", url: p.url, addedAt: Date.now() };
        } else {
          newItem = { id, kind: p.kind, type: p.type || "", title: p.title || "", source: p.source || "", fileName: p.fileName, sizeKB: p.sizeKB, addedAt: Date.now() };
          blobData = p.dataUrl;
          try { await window.storage.set("media-blob:" + id, JSON.stringify({ url: p.dataUrl }), false); } catch (e) {}
        }
        return { newItem, blobData, assignProductId: p.assignProductId || "" };
      })
    );
    const newBlobs = {};
    results.forEach((r) => { if (r.blobData) newBlobs[r.newItem.id] = r.blobData; });
    setMediaIndex((prev) => {
      let nextCode = Math.max(0, ...prev.map((m) => parseInt(m.code, 10) || 0)) + 1;
      const codedItems = results.map((r) => {
        const coded = { ...r.newItem, code: String(nextCode).padStart(5, "0") };
        nextCode += 1;
        return coded;
      });
      return [...codedItems, ...prev];
    });
    setMediaBlobs((prev) => ({ ...prev, ...newBlobs }));
    if (onNewIds) onNewIds(results.map((r) => ({ id: r.newItem.id, assignProductId: r.assignProductId })));
  };

  // Tags newly uploaded media items with a product — they stay in the library
  // and can be filtered by product in the media tab; they do NOT auto-fill
  // the product's image card slots (user does that manually via picking mode).
  const assignMediaToProduct = (productId, mediaIds) => {
    setMediaIndex((prev) => prev.map((m) =>
      mediaIds.includes(m.id) ? { ...m, assignedProductId: productId } : m
    ));
  };

  // ── Budget: categories + transactions (auto-saves immediately, like a ledger — no draft/Save step) ──
  const persistBudgetCategories = (next) => {
    setBudgetCategories(next);
    window.storage?.set(BUDGET_CATEGORIES_KEY, JSON.stringify(next), false).catch(() => {});
  };
  const persistBudgetTransactions = (next) => {
    setBudgetTransactions(next);
    window.storage?.set(BUDGET_TRANSACTIONS_KEY, JSON.stringify(next), false).catch(() => {});
  };

  // Drag-and-drop reordering — moves the dragged category/transaction to sit
  // right where the drop target currently is, preserving everything else's order.
  const reorderBudgetCategories = (draggedId, targetId) => {
    if (draggedId === targetId) return;
    const fromIdx = budgetCategories.findIndex((c) => c.id === draggedId);
    const toIdx = budgetCategories.findIndex((c) => c.id === targetId);
    if (fromIdx === -1 || toIdx === -1) return;
    const reordered = [...budgetCategories];
    const [moved] = reordered.splice(fromIdx, 1);
    const newToIdx = reordered.findIndex((c) => c.id === targetId);
    reordered.splice(newToIdx, 0, moved);
    persistBudgetCategories(reordered);
  };

  const reorderBudgetTransactions = (draggedId, targetId) => {
    if (draggedId === targetId) return;
    const fromIdx = budgetTransactions.findIndex((t) => t.id === draggedId);
    const toIdx = budgetTransactions.findIndex((t) => t.id === targetId);
    if (fromIdx === -1 || toIdx === -1) return;
    const reordered = [...budgetTransactions];
    const [moved] = reordered.splice(fromIdx, 1);
    const newToIdx = reordered.findIndex((t) => t.id === targetId);
    reordered.splice(newToIdx, 0, moved);
    persistBudgetTransactions(reordered);
  };

  const addBudgetCategory = (name, budgetAmount) => {
    if (!name.trim()) return;
    const cat = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), name: name.trim(), budgetAmount: budgetAmount || "0", included: true };
    persistBudgetCategories([...budgetCategories, cat]);
  };

  const updateBudgetCategory = (id, field, value) => {
    persistBudgetCategories(budgetCategories.map((c) => (c.id === id ? { ...c, [field]: value } : c)));
  };

  const deleteBudgetCategory = (id) => {
    persistBudgetCategories(budgetCategories.filter((c) => c.id !== id));
    persistBudgetTransactions(budgetTransactions.filter((t) => t.categoryId !== id));
  };

  const updateMainBudgetAmount = (value) => {
    setMainBudgetAmount(value);
    window.storage?.set(MAIN_BUDGET_KEY, JSON.stringify(value), false).catch(() => {});
  };

  const persistBudgetAdjustments = (next) => {
    setBudgetAdjustments(next);
    window.storage?.set(BUDGET_ADJUSTMENTS_KEY, JSON.stringify(next), false).catch(() => {});
  };

  // Adjusts a budget's amount (Grand Budget if categoryId is null, otherwise
  // a specific sub-budget) by a signed delta, and records the adjustment as
  // its own history entry (amount, date, notes) for the collapsible log.
  const addBudgetAdjustment = (categoryId, delta, notes) => {
    if (categoryId === null) {
      updateMainBudgetAmount(String(parseFloat(mainBudgetAmount || 0) + delta));
    } else {
      const cat = budgetCategories.find((c) => c.id === categoryId);
      if (cat) updateBudgetCategory(categoryId, "budgetAmount", String(parseFloat(cat.budgetAmount || 0) + delta));
    }
    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      categoryId,
      amount: delta,
      date: new Date().toISOString().slice(0, 10),
      notes: notes || "",
    };
    persistBudgetAdjustments([entry, ...budgetAdjustments]);
  };

  // Undoes an Estimate→Expense conversion or split: deletes the resulting
  // Expense transaction and adds its amount back onto the original Estimate
  // (reactivating it if it had been fully consumed).
  const reverseConversion = (expenseId) => {
    const expenseTx = budgetTransactions.find((t) => t.id === expenseId);
    if (!expenseTx || !expenseTx.convertedFromId) return;
    const amt = parseFloat(expenseTx.amount || 0);
    persistBudgetTransactions(
      budgetTransactions
        .filter((t) => t.id !== expenseId)
        .map((t) =>
          t.id === expenseTx.convertedFromId
            ? { ...t, amount: String(parseFloat(t.amount || 0) + amt), included: true, convertedIntoId: null }
            : t
        )
    );
  };

  // Splits off part of an Estimate as its own Expense, leaving the remainder
  // of the Estimate active and pending — so it can be split again later,
  // incrementally, until it's fully spent.
  const splitEstimateToExpenditure = (id, splitAmount, notes) => {
    const original = budgetTransactions.find((t) => t.id === id);
    if (!original) return;
    const originalAmt = parseFloat(original.amount || 0);
    const splitAmt = Math.min(parseFloat(splitAmount || 0), originalAmt);
    if (splitAmt <= 0) return;
    const remaining = originalAmt - splitAmt;
    const newTx = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      categoryId: original.categoryId,
      type: "expenditure",
      amount: String(splitAmt),
      description: original.description,
      date: new Date().toISOString().slice(0, 10),
      notes: notes || "",
      included: true,
      discrepancyNote: "",
      originalAmount: "",
      convertedFrom: "estimate",
      convertedFromId: original.id,
    };
    // If the split uses up the whole remaining estimate, treat it like a full
    // conversion (mark it consumed); otherwise keep the estimate active with
    // its reduced amount, ready to be split again.
    const updatedOriginal = remaining <= 0.004
      ? { ...original, amount: "0", included: false, convertedIntoId: newTx.id }
      : { ...original, amount: String(remaining) };
    persistBudgetTransactions([newTx, ...budgetTransactions.map((t) => (t.id === id ? updatedOriginal : t))]);
  };

  // categoryId may be null — that means a general transaction that belongs
  // to the Main budget directly, not to any specific sub-budget/category.
  const addBudgetTransaction = (categoryId, type, amount, description, date, notes) => {
    const tx = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      categoryId: categoryId || null,
      type, // "estimate" | "expenditure"
      amount: amount || "0",
      description: description || "",
      date: date || new Date().toISOString().slice(0, 10),
      notes: notes || "",
      included: true, // universal toggle — either type can be switched out of the budget view
      discrepancyNote: "",
      originalAmount: "", // set when an estimate is later converted, if the final amount differs
      convertedFrom: null, // "estimate" — set once a conversion happens, for a small audit trail
    };
    persistBudgetTransactions([tx, ...budgetTransactions]);
  };

  const deleteBudgetTransaction = (id) => {
    persistBudgetTransactions(budgetTransactions.filter((t) => t.id !== id));
  };

  // Universal include/exclude toggle — lets either type be temporarily left
  // out of the budget's totals without deleting it.
  const toggleTransactionIncluded = (id) => {
    persistBudgetTransactions(
      budgetTransactions.map((t) => {
        if (t.id !== id) return t;
        const current = t.included !== undefined ? t.included : !t.excluded;
        return { ...t, included: !current };
      })
    );
  };

  // Converts an Estimate into an Expenditure — the Estimate stays as its own
  // listing (auto-excluded from totals so nothing double-counts, but still
  // visible for history), and a brand new Expenditure transaction is created
  // alongside it, with its own independent notes field.
  const convertEstimateToExpenditure = (id, actualAmount, discrepancyNote) => {
    const original = budgetTransactions.find((t) => t.id === id);
    if (!original) return;
    const newTx = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      categoryId: original.categoryId,
      type: "expenditure",
      amount: actualAmount || original.amount,
      description: original.description,
      date: new Date().toISOString().slice(0, 10),
      notes: "",
      included: true,
      discrepancyNote: discrepancyNote || "",
      originalAmount: original.amount,
      convertedFrom: "estimate",
      convertedFromId: original.id,
    };
    const updatedOriginal = { ...original, included: false, convertedIntoId: newTx.id };
    persistBudgetTransactions([newTx, ...budgetTransactions.map((t) => (t.id === id ? updatedOriginal : t))]);
  };

  const updateBudgetTransactionField = (id, field, value) => {
    persistBudgetTransactions(budgetTransactions.map((t) => (t.id === id ? { ...t, [field]: value } : t)));
  };

  // Immediately syncs an inventory field change to both products and open draft
  const instantInventoryUpdate = (productId, sizeId, field, value) => {
    // Find old value for history recording before the update
    const product = products.find((p) => p.id === productId);
    const size = product?.sizes?.find((s) => s.id === sizeId);
    if (["qtyOnHand", "defaultQty"].includes(field) && size && String(size[field] || "0") !== String(value)) {
      recordInventoryChange(product?.name || "—", size?.size || "—", field, size[field] || "0", value, product?.brand || "", product?.description || "");
    }
    const applyToSize = (s) => {
      if (s.id !== sizeId) return s;
      const updated = { ...s, [field]: value };
      if (field === "qtyOnHand") {
        const delta = parseFloat(value || 0) - parseFloat(s.qtyOnHand || 0);
        updated.qtyAvailable = String(Math.max(0, parseFloat(s.qtyAvailable || 0) + delta));
      }
      return updated;
    };
    setProducts((prev) => prev.map((p) => p.id !== productId ? p : { ...p, sizes: (p.sizes || []).map(applyToSize) }));
    setDraft((prev) => {
      if (!prev.id || prev.id !== productId) return prev;
      return { ...prev, sizes: (prev.sizes || []).map(applyToSize) };
    });
  };

  const recordInventoryChange = (productName, sizeLabel, field, from, to, brand = "", description = "") => {
    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      ts: Date.now(),
      productName,
      sizeLabel,
      brand,
      description,
      field: field === "qtyOnHand" ? "Qty on Hand" : field === "defaultQty" ? "Default" : field,
      from: String(from || "0"),
      to: String(to),
    };
    setInventoryHistory((prev) => {
      const updated = [entry, ...prev].slice(0, 2000);
      window.storage?.set("aster-inv-history-v1", JSON.stringify(updated), false).catch(() => {});
      return updated;
    });
  };

  const toggleHighlight = (id) => {
    setHighlightedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      window.storage?.set("aster-highlights-v1", JSON.stringify([...next]), false).catch(() => {});
      return next;
    });
  };

  const clearHighlights = () => {
    setHighlightedIds(new Set());
    window.storage?.set("aster-highlights-v1", "[]", false).catch(() => {});
  };

  const saveAiDraft = (content, label) => {
    const draft = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), content, label: label || "Untitled draft", savedAt: Date.now() };
    setSavedDrafts((prev) => {
      const next = [draft, ...prev].slice(0, 200);
      window.storage?.set("aster-ai-drafts-v1", JSON.stringify(next), false).catch(() => {});
      return next;
    });
  };

  const deleteAiDraft = (id) => {
    setSavedDrafts((prev) => {
      const next = prev.filter((d) => d.id !== id);
      window.storage?.set("aster-ai-drafts-v1", JSON.stringify(next), false).catch(() => {});
      return next;
    });
  };

  const updateMediaItem = (id, field, value) => {
    setMediaIndex((prev) => prev.map((m) => (m.id === id ? { ...m, [field]: value } : m)));
  };

  const replaceMediaImage = async (id, file) => {
    try {
      const dataUrl = await readAsDataURL(file);
      setMediaBlobs((prev) => ({ ...prev, [id]: dataUrl }));
      await window.storage.set("media-blob:" + id, JSON.stringify({ url: dataUrl }), false);
    } catch (e) {
      console.error("Failed to replace image", e);
    }
  };

  // Moves a media item to trash (kept 30 days) instead of permanently deleting it
  const deleteMedia = (id) => {
    const item = mediaIndex.find((m) => m.id === id);
    const blobUrl = mediaBlobs[id] || null;
    if (item) {
      const trashEntry = { id, item, deletedAt: Date.now(), blobUrl };
      setMediaTrash((prev) => {
        const next = [trashEntry, ...prev];
        // Persist metadata index (small) and blob (separately, may be larger)
        window.storage?.set("aster-media-trash-v1", JSON.stringify(next.map(({ blobUrl, ...rest }) => rest)), false).catch(() => {});
        if (blobUrl) window.storage?.set("media-trash-blob:" + id, JSON.stringify({ url: blobUrl }), false).catch(() => {});
        return next;
      });
    }
    setMediaIndex((prev) => prev.filter((m) => m.id !== id));
    setMediaBlobs((prev) => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
    (async () => {
      try { await window.storage.delete("media-blob:" + id, false); } catch (e) {}
    })();
    setDraft((prev) => ({ ...prev, images: (prev.images || []).filter((imgId) => imgId !== id) }));
  };

  // Restores a trashed item back into the live media library
  const restoreMediaFromTrash = (id) => {
    const entry = mediaTrash.find((t) => t.id === id);
    if (!entry) return;
    setMediaIndex((prev) => [entry.item, ...prev]);
    if (entry.blobUrl) {
      setMediaBlobs((prev) => ({ ...prev, [id]: entry.blobUrl }));
      window.storage?.set("media-blob:" + id, JSON.stringify({ url: entry.blobUrl }), false).catch(() => {});
    }
    setMediaTrash((prev) => {
      const next = prev.filter((t) => t.id !== id);
      window.storage?.set("aster-media-trash-v1", JSON.stringify(next.map(({ blobUrl, ...rest }) => rest)), false).catch(() => {});
      return next;
    });
    window.storage?.delete("media-trash-blob:" + id, false).catch(() => {});
  };

  const toggleImageForDraft = (id) => {
    setDraft((prev) => {
      const current = prev.images || [];
      if (current.includes(id)) {
        return { ...prev, images: current.filter((x) => x !== id) };
      }
      return { ...prev, images: [...current, id] };
    });
  };

  // Links (or unlinks) an image to a specific size/shade row
  const toggleImageLinkForSize = (sizeId, imageId) => {
    setDraft((prev) => ({
      ...prev,
      sizes: prev.sizes.map((s) => {
        if (s.id !== sizeId) return s;
        const linked = s.linkedImageIds || [];
        return {
          ...s,
          linkedImageIds: linked.includes(imageId) ? linked.filter((x) => x !== imageId) : [...linked, imageId],
        };
      }),
    }));
  };

  const brandCounts = useMemo(() => {
    const map = {};
    products.forEach((p) => { if (p.brand) map[p.brand] = (map[p.brand] || 0) + 1; });
    return Object.entries(map);
  }, [products]);

  useEffect(() => {
    setSummaryBrands((prev) => {
      const next = { ...prev };
      let changed = false;
      brandCounts.forEach(([brand]) => {
        if (!(brand in next)) { next[brand] = true; changed = true; }
      });
      return changed ? next : prev;
    });
  }, [brandCounts]);

  const inventorySummary = useMemo(() => {
    let valueAvailable = 0;
    let valueDefault = 0;
    products.forEach((p) => {
      if (summaryBrands[p.brand] === false) return;
      (p.sizes || []).forEach((s) => {
        const cost = parseFloat(s.wholesale || 0);
        valueAvailable += cost * parseFloat(s.qtyAvailable || 0);
        valueDefault += cost * parseFloat(s.defaultQty || 0);
      });
    });
    return { valueAvailable, valueDefault, difference: valueDefault - valueAvailable };
  }, [products, summaryBrands]);

  // Which products use a given media id — for the global Media search view
  const productsByMediaId = useMemo(() => {
    const map = {};
    products.forEach((p) => {
      (p.images || []).forEach((imgId) => {
        if (!map[imgId]) map[imgId] = [];
        map[imgId].push(p.name);
      });
    });
    return map;
  }, [products]);

  // Media that belongs only to inactive products — shown dimmed in the Library, but still fully interactive
  const inactiveMediaIds = useMemo(() => {
    const ids = new Set();
    products.filter((p) => p.isActive === false).forEach((p) => {
      (p.images || []).forEach((id) => ids.add(id));
    });
    mediaIndex.forEach((m) => {
      if (m.assignedProductId) {
        const prod = products.find((p) => p.id === m.assignedProductId);
        if (prod && prod.isActive === false) ids.add(m.id);
      }
    });
    return ids;
  }, [products, mediaIndex]);

  const filteredGlobalMedia = useMemo(() => {
    const q = mediaSearchQuery.trim().toLowerCase();
    if (!q) return mediaIndex;
    return mediaIndex.filter((m) =>
      (m.title || "").toLowerCase().includes(q) ||
      (m.source || "").toLowerCase().includes(q) ||
      (m.type || "").toLowerCase().includes(q) ||
      (m.kind || "").toLowerCase().includes(q) ||
      (m.fileName || "").toLowerCase().includes(q) ||
      (m.url || "").toLowerCase().includes(q) ||
      (productsByMediaId[m.id] || []).some((name) => name.toLowerCase().includes(q))
    );
  }, [mediaIndex, mediaSearchQuery, productsByMediaId]);

  const categoryCounts = useMemo(() => {
    const map = {};
    (memory.category || []).forEach((c) => { map[c] = 0; }); // every managed category shows, even with 0 products
    products.forEach((p) => { if (p.category) map[p.category] = (map[p.category] || 0) + 1; });
    return Object.entries(map);
  }, [products, memory.category]);

  const filtered = useMemo(() => {
    let list = [...products];
    if (statusFilter === "active") list = list.filter((p) => p.isActive !== false);
    else if (statusFilter === "inactive") list = list.filter((p) => p.isActive === false);
    // "all" — no status filter applied
    if (brandFilter !== "All") list = list.filter((p) => p.brand === brandFilter);
    if (categoryFilter) list = list.filter((p) => p.category === categoryFilter);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter((p) => {
        const inName = p.name.toLowerCase().includes(q);
        const inBrand = (p.brand || "").toLowerCase().includes(q);
        const inCategory = (p.category || "").toLowerCase().includes(q);
        const inDesc = (p.description || "").toLowerCase().includes(q);
        const inInfo = (p.additionalInfo || "").toLowerCase().includes(q);
        const inShopify = (p.shopifyHandle || "").toLowerCase().includes(q);
        const inSizes = (p.sizes || []).some((s) =>
          (s.sku || "").toLowerCase().includes(q) ||
          (s.size || "").toLowerCase().includes(q)
        );
        return inName || inBrand || inCategory || inDesc || inInfo || inShopify || inSizes;
      });
    }
    const firstRetail = (p) => parseFloat((p.sizes && p.sizes[0] && p.sizes[0].retail) || 0);
    if (sort === "Name A-Z") list.sort((a, b) => a.name.localeCompare(b.name));
    if (sort === "Name Z-A") list.sort((a, b) => b.name.localeCompare(a.name));
    if (sort === "Price High-Low") list.sort((a, b) => firstRetail(b) - firstRetail(a));
    if (sort === "Price Low-High") list.sort((a, b) => firstRetail(a) - firstRetail(b));
    return list;
  }, [products, brandFilter, categoryFilter, search, sort]);

  const openAddModal = () => {
    setDraft(emptyDraft());
    setIsEditing(false);
    setActiveTab("Product");
    setPickingImages(false);
    setConfirmingDelete(false);
    setCollapsedSizeIds(new Set());
    setImageLinkPopover(null);
    setHighlightedForSizeId(null);
    setExpandedIngredientsIds(new Set());
    setModalOpen(true);
  };

  const openEditModal = (product) => {
    const safeProduct = {
      ...product,
      sizes: Array.isArray(product.sizes) && product.sizes.length > 0 ? product.sizes : [newSizeRow()],
    };
    const snapshot = JSON.parse(JSON.stringify(safeProduct));
    setDraft(snapshot);
    draftLoadedRef.current = snapshot; // snapshot for change detection
    setIsEditing(true);
    setActiveTab("Product");
    setPickingImages(false);
    setConfirmingDelete(false);
    setCollapsedSizeIds(new Set());
    setImageLinkPopover(null);
    setHighlightedForSizeId(null);
    setExpandedIngredientsIds(new Set());
    setModalOpen(true);
  };

  const closeModal = () => { setModalOpen(false); setPickingImages(false); setConfirmingDelete(false); };

  const applyProductActiveToggle = () => {
    const currentlyActive = draft.isActive !== false;
    const updatedDraft = { ...draft, isActive: !currentlyActive };
    setDraft(updatedDraft);
    setProducts((prev) => prev.map((p) => p.id === draft.id ? { ...p, isActive: !currentlyActive } : p));
    if (currentlyActive) closeModal();
  };

  const toggleProductActive = (e) => {
    const currentlyActive = draft.isActive !== false;
    if (currentlyActive) {
      const totalQtyOnHand = (draft.sizes || []).reduce((sum, s) => sum + (parseFloat(s.qtyOnHand || 0) || 0), 0);
      if (totalQtyOnHand > 0) {
        setDeactivateWarning({ rect: e?.currentTarget?.getBoundingClientRect(), qty: totalQtyOnHand });
        return;
      }
    }
    applyProductActiveToggle();
  };

  // Compares the currently open draft against the snapshot taken when the modal opened
  // (or last saved), and silently logs every detected change to history. No popups —
  // this only runs when Save or Save and Close is actually clicked.
  const recordAllChangesOnSave = (finalDraft) => {
    const loaded = draftLoadedRef.current;
    if (!loaded || !isEditing) return;
    const textFields = [["name", "Product Name"], ["description", "Description"], ["shopifyHandle", "Shopify Handle"]];
    textFields.forEach(([k, label]) => {
      const oldV = loaded[k] || "", newV = finalDraft[k] || "";
      if (oldV && oldV !== newV) {
        recordInventoryChange(finalDraft.name, "", label, oldV, newV, finalDraft.brand || "", finalDraft.description || "");
      }
    });
    (finalDraft.sizes || []).forEach((s, i) => {
      const os = loaded.sizes?.[i];
      if (!os) return; // newly added size/shade — nothing to compare against
      const sizeLabel = s.size || (s.sizeType === "shade" ? `Shade ${i + 1}` : `Size ${i + 1}`);
      [["wholesale", "Wholesale"], ["retail", "Retail"], ["qtyOnHand", "Qty on Hand"], ["defaultQty", "Default"]].forEach(([k, label]) => {
        const oldV = os[k] || "", newV = s[k] || "";
        if (oldV && oldV !== newV) {
          recordInventoryChange(finalDraft.name, sizeLabel, label, oldV, newV, finalDraft.brand || "", finalDraft.description || "");
        }
      });
      const oldMl = os.volumeMl || "0", oldOz = os.volumeOz || "0";
      const newMl = s.volumeMl || "0", newOz = s.volumeOz || "0";
      if ((os.volumeMl || os.volumeOz) && (oldMl !== newMl || oldOz !== newOz)) {
        recordInventoryChange(finalDraft.name, sizeLabel, "Volume", `${oldMl}ml / ${oldOz}oz`, `${newMl}ml / ${newOz}oz`, finalDraft.brand || "", finalDraft.description || "");
      }
    });
  };

  const saveProduct = () => {
    if (!draft.name.trim()) return;
    if (isEditing) {
      recordAllChangesOnSave(draft);
      setProducts((prev) => prev.map((p) => (p.id === draft.id ? { ...draft } : p)));
      draftLoadedRef.current = JSON.parse(JSON.stringify(draft));
    } else {
      const newId = Date.now().toString();
      const saved = { ...draft, id: newId };
      setProducts((prev) => [...prev, saved]);
      setDraft(saved);
      draftLoadedRef.current = JSON.parse(JSON.stringify(saved));
      setIsEditing(true);
    }
    setSaveFlash(true);
    setTimeout(() => setSaveFlash(false), 1400);
  };

  const saveDraft = () => {
    if (!draft.name.trim()) return;
    if (isEditing) {
      recordAllChangesOnSave(draft);
      setProducts((prev) => prev.map((p) => (p.id === draft.id ? { ...draft } : p)));
    } else {
      setProducts((prev) => [...prev, { ...draft, id: Date.now().toString() }]);
    }
    setModalOpen(false);
  };

  const deleteProduct = (id) => setProducts((prev) => prev.filter((p) => p.id !== id));
  const updateDraft = (field, value) => setDraft((prev) => ({ ...prev, [field]: value }));

  const updateSize = (index, field, value) => {
    setDraft((prev) => {
      const sizes = [...prev.sizes];
      const cur = sizes[index];
      const updated = { ...cur, [field]: value };
      if (field === "qtyOnHand") {
        const delta = parseFloat(value || 0) - parseFloat(cur.qtyOnHand || 0);
        updated.qtyAvailable = String(Math.max(0, parseFloat(cur.qtyAvailable || 0) + delta));
      }
      sizes[index] = updated;
      return { ...prev, sizes };
    });
    // NOTE: no longer mirrors to `products` immediately — nothing is persisted
    // until the user clicks Save or Save and Close.
  };

  const addSize = () => setDraft((prev) => ({ ...prev, sizes: [...prev.sizes, newSizeRow("size")] }));
  const addShade = () => setDraft((prev) => ({ ...prev, sizes: [...prev.sizes, newSizeRow("shade")] }));
  const removeSize = (index) => setDraft((prev) => ({ ...prev, sizes: prev.sizes.filter((_, i) => i !== index) }));

  // Deleting the base (default) size/shade doesn't remove it from the list or
  // promote the next one — it just clears the fields so it can be filled in again.
  const clearBaseSize = () => setDraft((prev) => {
    const sizes = [...prev.sizes];
    const currentType = sizes[0]?.sizeType || "size";
    sizes[0] = { ...newSizeRow(currentType), id: sizes[0].id };
    return { ...prev, sizes };
  });

  const toggleSizeCollapsed = (id) => {
    setCollapsedSizeIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const toggleCollapseAll = () => {
    const additionalIds = draft.sizes.slice(1).map((s) => s.id);
    const allCollapsed = additionalIds.length > 0 && additionalIds.every((id) => collapsedSizeIds.has(id));
    setCollapsedSizeIds(allCollapsed ? new Set() : new Set(additionalIds));
  };

  const toggleIngredientsExpanded = (id) => {
    setExpandedIngredientsIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  // ── Export all app data to a downloadable JSON backup file ─────────────────
  // Storage can fail on individual keys (size limits, rate limits) — this never
  // throws, just reports success/failure so callers can continue past one bad key
  // instead of the whole import/export aborting on a single failed write.
  const setStorageSafe = async (key, value) => {
    try {
      const result = await window.storage.set(key, value, false);
      return !!result;
    } catch (e) {
      return false;
    }
  };

  // Runs many storage calls in small batches rather than all at once — firing
  // dozens of parallel writes (e.g. one per media file) is what was hitting the
  // storage API's rate limit and surfacing as "storage set failed" on import.
  const runBatched = async (items, worker, batchSize = 5) => {
    const results = [];
    for (let i = 0; i < items.length; i += batchSize) {
      const batch = items.slice(i, i + batchSize);
      results.push(...(await Promise.all(batch.map(worker))));
      if (i + batchSize < items.length) await new Promise((r) => setTimeout(r, 150));
    }
    return results;
  };

  const defaultBackupName = () => {
    const stamp = new Date().toISOString().slice(0, 19).replace(/:/g, "-");
    return `aster-catalog-backup-${stamp}`;
  };

  // Step 1: always shown in-app, regardless of browser — asks for a filename
  // before anything is saved.
  const exportData = () => {
    setExportFileNameInput(defaultBackupName());
    setExportNamePrompt(true);
  };

  // Step 2: builds the backup and finalizes the save using the chosen name.
  const finalizeExport = async (chosenName) => {
    setExportNamePrompt(false);
    setExportStatus("exporting");
    try {
      const filename = (chosenName || defaultBackupName()).replace(/\.json$/i, "") + ".json";
      const blobMap = {};
      await runBatched(mediaIndex.filter((m) => !m.url), async (m) => {
        try {
          const b = await window.storage.get("media-blob:" + m.id, false);
          if (b && b.value) blobMap[m.id] = JSON.parse(b.value).url;
        } catch (e) {}
      });
      // Media trash keeps its own blobs separately from the live library
      const trashBlobMap = {};
      await runBatched(mediaTrash || [], async (t) => {
        try {
          const b = await window.storage.get("media-trash-blob:" + t.id, false);
          if (b && b.value) trashBlobMap[t.id] = JSON.parse(b.value).url;
        } catch (e) {}
      });
      const payload = JSON.stringify({
        version: 2,
        exportedAt: new Date().toISOString(),
        products,
        mediaIndex,
        mediaBlobs: blobMap,
        memory,
        inventoryHistory,
        highlightedIds: [...(highlightedIds || [])],
        mediaTrash: mediaTrash || [],
        mediaTrashBlobs: trashBlobMap,
        savedDrafts,
      });

      // Preferred: native "Save As" dialog — opens Finder/Explorer so the person
      // can also pick the folder, with the name they just chose pre-filled.
      // Chromium browsers only (Chrome, Edge); falls back below otherwise.
      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: filename,
            types: [{ description: "JSON backup", accept: { "application/json": [".json"] } }],
          });
          const writable = await handle.createWritable();
          await writable.write(payload);
          await writable.close();
          setExportedFileName(handle.name);
          setExportUsedPicker(true);
          setExportPayload("");
          setExportStatus("done");
          setTimeout(() => setExportStatus(null), 6000);
          return;
        } catch (e) {
          if (e.name === "AbortError") { setExportStatus(null); return; } // person cancelled the picker
          // otherwise fall through to the automatic-download fallback below
        }
      }

      // Fallback for browsers without the File System Access API (Safari, Firefox),
      // or environments that block programmatic downloads outright (some sandboxed
      // embeds silently swallow the click below with no error and no file — since
      // JS can't detect that, the payload is always kept too so Copy always works
      // as a guaranteed alternative regardless of what the download actually did).
      setExportPayload(payload);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setExportedFileName(filename);
      setExportUsedPicker(false);
      setExportStatus("done");
      // No auto-dismiss here — the download's actual success can't be confirmed
      // from JS, so this stays visible until the person manually closes it,
      // giving them time to check for the file and use Copy if it's not there.
    } catch (e) {
      setExportedFileName("");
      setExportStatus("error");
      setExportMessage("Export failed: " + e.message);
      setTimeout(() => setExportStatus(null), 6000);
    }
  };

  // ── Import/restore from a backup JSON file ─────────────────────────────────
  // Parses + validates the file, then stages it for an in-app confirmation
  // (not window.confirm — native dialogs can be silently blocked in some
  // embedded/sandboxed environments, which would make the whole import
  // silently no-op with zero indication of anything happening).
  const importData = async (file) => {
    if (!file) return;
    setImportStatus(null);
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.version || !data.products) throw new Error("Unrecognised backup format");
      const extras = [];
      if (data.inventoryHistory?.length) extras.push(`${data.inventoryHistory.length} history entries`);
      if (data.highlightedIds?.length) extras.push(`${data.highlightedIds.length} highlighted items`);
      if (data.mediaTrash?.length) extras.push(`${data.mediaTrash.length} trash items`);
      if (data.savedDrafts?.length) extras.push(`${data.savedDrafts.length} saved drafts`);
      setImportConfirm({ data, extras });
    } catch (e) {
      setImportStatus("error");
      setImportMessage("Couldn't read this file: " + e.message);
    }
  };

  const performImport = async () => {
    if (!importConfirm) return;
    const { data } = importConfirm;
    setImportConfirm(null);
    const failures = [];
    try {
      if (!(await setStorageSafe(PRODUCTS_KEY, JSON.stringify(data.products)))) failures.push("products");
      if (data.mediaIndex && !(await setStorageSafe(MEDIA_INDEX_KEY, JSON.stringify(data.mediaIndex)))) failures.push("media index");
      if (data.memory && !(await setStorageSafe(MEMORY_KEY, JSON.stringify(data.memory)))) failures.push("dropdown lists");

      if (data.mediaBlobs) {
        const entries = Object.entries(data.mediaBlobs);
        const results = await runBatched(entries, ([id, url]) => setStorageSafe("media-blob:" + id, JSON.stringify({ url })));
        const failedCount = results.filter((ok) => !ok).length;
        if (failedCount > 0) failures.push(`${failedCount} of ${entries.length} media files`);
      }
      // v2+ fields — older (v1) backups simply won't have these, and that's fine
      if (data.inventoryHistory && !(await setStorageSafe("aster-inv-history-v1", JSON.stringify(data.inventoryHistory)))) failures.push("history log");
      if (data.highlightedIds && !(await setStorageSafe("aster-highlights-v1", JSON.stringify(data.highlightedIds)))) failures.push("highlighted media");
      if (data.mediaTrash) {
        if (!(await setStorageSafe("aster-media-trash-v1", JSON.stringify(data.mediaTrash)))) failures.push("media trash");
        if (data.mediaTrashBlobs) {
          const entries = Object.entries(data.mediaTrashBlobs);
          const results = await runBatched(entries, ([id, url]) => setStorageSafe("media-trash-blob:" + id, JSON.stringify({ url })));
          const failedCount = results.filter((ok) => !ok).length;
          if (failedCount > 0) failures.push(`${failedCount} of ${entries.length} trash files`);
        }
      }
      if (data.savedDrafts && !(await setStorageSafe("aster-ai-drafts-v1", JSON.stringify(data.savedDrafts)))) failures.push("saved drafts");

      // Update the visible app regardless of storage write outcome — a best-effort
      // restore now is better than nothing, even if some pieces didn't persist.
      setProducts(data.products);
      setMediaIndex(data.mediaIndex || []);
      setMediaBlobs(data.mediaBlobs || {});
      setMemory((prev) => ({ ...prev, ...(data.memory || {}) }));
      if (data.inventoryHistory) setInventoryHistory(data.inventoryHistory);
      if (data.highlightedIds) setHighlightedIds(new Set(data.highlightedIds));
      if (data.mediaTrash) setMediaTrash(data.mediaTrash);
      if (data.savedDrafts) setSavedDrafts(data.savedDrafts);

      if (failures.length > 0) {
        setImportStatus("error");
        setImportMessage(`Restored on screen, but didn't fully save: ${failures.join(", ")}. Re-importing may help if this persists.`);
      } else {
        setImportStatus("done");
        setImportMessage(`Restored ${data.products.length} products and ${(data.mediaIndex || []).length} media items.`);
      }
      setTimeout(() => setImportStatus(null), 7000);
    } catch (e) {
      setImportStatus("error");
      setImportMessage("Import failed: " + e.message);
      setTimeout(() => setImportStatus(null), 7000);
    }
  };

  return (
    <>
      {/* Top-level section switcher — separate from the product-editing tabs below */}
      <div className="bg-[#242320] px-6 py-2.5 flex items-center gap-2">
        <button
          onClick={() => setAppSection("Products")}
          className={`text-[13px] font-semibold px-4 py-1.5 rounded-full transition tracking-wide ${appSection === "Products" ? "text-white" : "text-[#C4BFB0] hover:text-white"}`}
          style={appSection === "Products" ? { backgroundColor: "#B9924F" } : {}}
        >
          Products
        </button>
        <button
          onClick={() => setAppSection("Budget")}
          className={`text-[13px] font-semibold px-4 py-1.5 rounded-full transition tracking-wide ${appSection === "Budget" ? "text-white" : "text-[#C4BFB0] hover:text-white"}`}
          style={appSection === "Budget" ? { backgroundColor: "#B9924F" } : {}}
        >
          Budget
        </button>
      </div>

      <style>{`
        .input { width: 100%; border: 1px solid #E3DDCC; border-radius: 10px; padding: 9px 11px; font-size: 13.5px; outline: none; background: white; color: #242320; font-family: inherit; }
        .input:focus { border-color: #B9924F; }
        .input-sm { padding: 6px 9px; font-size: 12.5px; border-radius: 8px; }
        textarea.input { resize: vertical; }
        @keyframes spin { to { transform: rotate(360deg); } }
      `}</style>

      {appSection === "Budget" ? (
        <BudgetSection
          mainBudgetAmount={mainBudgetAmount}
          onUpdateMainBudget={updateMainBudgetAmount}
          categories={budgetCategories}
          transactions={budgetTransactions}
          adjustments={budgetAdjustments}
          onAddCategory={addBudgetCategory}
          onUpdateCategory={updateBudgetCategory}
          onDeleteCategory={deleteBudgetCategory}
          onAddTransaction={addBudgetTransaction}
          onDeleteTransaction={deleteBudgetTransaction}
          onToggleIncluded={toggleTransactionIncluded}
          onConvertEstimate={convertEstimateToExpenditure}
          onSplitEstimate={splitEstimateToExpenditure}
          onReverseConversion={reverseConversion}
          onAddAdjustment={addBudgetAdjustment}
          onUpdateField={updateBudgetTransactionField}
          onReorderCategories={reorderBudgetCategories}
          onReorderTransactions={reorderBudgetTransactions}
        />
      ) : (
    <div style={{ fontFamily: "-apple-system, 'Segoe UI', system-ui, sans-serif" }} className="min-h-screen bg-[#F6F4EF] text-[#242320]">
      <div className="bg-white border-b border-[#EAE5D9] px-10 py-6 flex items-center justify-between">
        <div>
          <h1 className="text-[32px] font-semibold leading-none text-[#242320] tracking-tight">
            Product<span className="text-[#B9924F]">.</span>Catalog
          </h1>
          <p className="text-[13px] text-[#A7A190] mt-1">{products.length} products</p>
        </div>
        <div className="flex items-center gap-3">
          <button
            type="button"
            onClick={() => setMediaSearchOpen(true)}
            className="flex items-center gap-2 text-sm rounded-full px-4 py-2.5 text-[#5B564C] font-medium border border-[#E0DACB] hover:bg-[#FAF8F3]"
          >
            <Search size={14} /> Library
          </button>
          <button
            type="button"
            onClick={() => setSummaryOpen(true)}
            className="flex items-center gap-2 text-sm rounded-full px-4 py-2.5 text-[#5B564C] font-medium border border-[#E0DACB] hover:bg-[#FAF8F3]"
          >
            <FileText size={14} /> Inventory Summary
          </button>
          {/* Export/Import now live in the gear menu — these are their status toasts and modals, not tied to a specific header icon */}
          {exportStatus === "done" && (
            <div className="fixed bottom-6 right-6 z-50 bg-white border border-[#E3DDCC] rounded-lg shadow-lg px-3.5 py-2.5 w-72 text-left">
              <div className="flex items-start justify-between gap-2">
                <p className="text-[12px] font-medium text-[#3F3B34] flex items-center gap-1.5"><Check size={13} className="text-[#5B8A6E]" /> Saved</p>
                <button onClick={() => setExportStatus(null)} className="text-[#C1BBAA] hover:text-[#242320] shrink-0"><X size={12} /></button>
              </div>
              <p className="text-[11px] text-[#5B564C] mt-1 break-all">{exportedFileName}</p>
              <p className="text-[10px] text-[#8A8377] mt-1.5">
                {exportUsedPicker
                  ? "Saved to the folder you chose."
                  : "This should have gone to your device's Downloads folder — check there or your browser's download history (Ctrl/Cmd+J)."}
              </p>
              {!exportUsedPicker && exportPayload && (
                <div className="mt-2 pt-2 border-t border-[#F0ECE1]">
                  <p className="text-[10px] text-[#8A8377] mb-1.5">Don't see the file? Copy the backup instead — this always works, then paste it into a new text file and save it with a <strong>.json</strong> ending.</p>
                  <button
                    onClick={() => { copyText(exportPayload); setExportCopied(true); setTimeout(() => setExportCopied(false), 2000); }}
                    className="w-full text-[11px] font-medium rounded-lg py-1.5 border border-[#B9924F] text-[#B9924F] hover:bg-[#FBEEDA] transition"
                  >
                    {exportCopied ? "Copied!" : "Copy backup to clipboard"}
                  </button>
                </div>
              )}
            </div>
          )}

function Field({ label, children }) {
  return (
    <div>
      <label className="block text-xs font-medium text-[#8A8377] mb-1.5">{label}</label>
      {children}
    </div>
  );
}

// PriceInput — controlled input that formats to 2 decimal places on blur.
// Uses local state so the format fires reliably even when focus moves to Save
// or another element; syncs back to parent only on blur and on external change.
function PriceInput({ value, onUpdate, placeholder = "0.00", className = "input", onHistoryCheck }) {
  const [local, setLocal] = useState(value);
  const inputRef = useRef(null);
  const parentRef = useRef(value);
  if (parentRef.current !== value) {
    parentRef.current = value;
    if (local !== value) setLocal(value);
  }
  const format = (raw) => {
    const trimmed = (raw || "").trim();
    const v = parseFloat(trimmed);
    return (!isNaN(v) && trimmed !== "") ? v.toFixed(2) : trimmed;
  };
  return (
    <input
      ref={inputRef}
      value={local}
      className={className}
      placeholder={placeholder}
      onChange={(e) => setLocal(e.target.value)}
      onBlur={() => {
        const formatted = format(local);
        setLocal(formatted);
        onUpdate(formatted);
        if (onHistoryCheck && inputRef.current) {
          onHistoryCheck(formatted, inputRef.current.getBoundingClientRect());
        }
      }}
    />
  );
}

function money(n) {
  const v = parseFloat(n || 0);
  return isNaN(v) ? "0.00" : v.toFixed(2);
}

// Formats an ISO date (YYYY-MM-DD) as MM/DD/YY, e.g. "04/13/26"
function formatDateShort(iso) {
  if (!iso) return "";
  const parts = iso.split("-");
  if (parts.length !== 3) return iso;
  const [y, m, d] = parts;
  return `${m}/${d}/${y.slice(2)}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Budget section — top-level, separate from the product catalog
// ─────────────────────────────────────────────────────────────────────────────

const BUDGET_TYPE_META = {
  estimate:    { label: "Estimate", color: "#5B564C", bg: "#EDE9DE", border: "#ACA692" },
  expenditure: { label: "Expense",  color: "#8F6B2E", bg: "#FBEEDA", border: "#B9924F" },
};
const BUDGET_TYPE_ORDER = ["estimate", "expenditure"];

// Reads a transaction's include/exclude state, falling back for older
// records saved before this field existed (always treated as included).
const isTxIncluded = (t) => (t.included !== undefined ? t.included : !t.excluded);

// Normalizes type names from every prior iteration of this feature so old
// saved data keeps calculating correctly.
const normalizeTxType = (t) => {
  if (["actual", "spend", "loan", "borrow", "addfunds"].includes(t.type)) return "expenditure";
  return t.type;
};

// Segmented bar: amber = expense, teal = pending estimates, cream track =
// remaining. Turns red if expense+estimate exceeds the budget.
// A standard sliding toggle switch (pill track + circle), used anywhere
// something needs to be included/excluded — transactions or entire budgets.
function ToggleSwitch({ on, onChange, title }) {
  const width = 26, height = 15, circle = height - 4;
  return (
    <button onClick={onChange} title={title} className="shrink-0" style={{ width, height, borderRadius: height / 2, backgroundColor: on ? "#D9CBAE" : "#E3DDCC", position: "relative", transition: "background-color 0.15s" }}>
      <span
        style={{
          position: "absolute", top: 2, left: on ? width - circle - 2 : 2,
          width: circle, height: circle, borderRadius: "50%", backgroundColor: "white",
          transition: "left 0.15s", boxShadow: "0 1px 2px rgba(0,0,0,0.15)",
        }}
      />
    </button>
  );
}

function BudgetBar({ budgetAmount, expenditure, pending, big }) {
  const total = parseFloat(budgetAmount || 0);
  const expPct = total > 0 ? Math.min(100, (expenditure / total) * 100) : (expenditure > 0 ? 100 : 0);
  const roomLeft = Math.max(0, 100 - expPct);
  const pendingPct = total > 0 ? Math.min(roomLeft, (pending / total) * 100) : (pending > 0 ? roomLeft : 0);
  const isOver = total > 0 && expenditure + pending > total;
  return (
    <div
      className={`rounded-full bg-[#F0ECE1] overflow-hidden flex ${big ? "h-3" : "h-2"}`}
      style={isOver ? { boxShadow: "0 0 0 1.5px #C0392B" } : {}}
    >
      <div style={{ width: pendingPct + "%", backgroundColor: "#ACA692" }} />
      <div style={{ width: expPct + "%", backgroundColor: "#B9924F" }} />
    </div>
  );
}

// Donut/wheel version of the same breakdown. Center shows the set budget.
function BudgetWheel({ budgetAmount, expenditure, pending, size = 92 }) {
  const total = parseFloat(budgetAmount || 0);
  const r = size / 2 - 9;
  const circumference = 2 * Math.PI * r;
  const denom = total > 0 ? total : (expenditure + pending || 1);
  const isOver = total > 0 && expenditure + pending > total;
  const segments = [
    { value: expenditure, color: "#B9924F" },
    { value: pending, color: "#ACA692" },
  ];
  let cumulative = 0;
  return (
    <div className="relative shrink-0" style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#F0ECE1" strokeWidth={9} />
        {segments.map((seg, i) => {
          if (seg.value <= 0) return null;
          const frac = Math.min(1, seg.value / denom);
          const dash = frac * circumference;
          const offset = -cumulative * circumference;
          cumulative += frac;
          return (
            <circle
              key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={seg.color} strokeWidth={9}
              strokeDasharray={`${dash} ${circumference - dash}`} strokeDashoffset={offset}
            />
          );
        })}
        {isOver && <circle cx={size / 2} cy={size / 2} r={r + 5.5} fill="none" stroke="#C0392B" strokeWidth={1.5} />}
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="text-[11px] font-semibold tabular-nums text-[#3F3B34]">${money(expenditure + pending)}</span>
        <span className="text-[8px] text-[#ACA692] uppercase tracking-wide">used</span>
      </div>
    </div>
  );
}

// Converts an Estimate into an Expense — final amount, and a note if it differs.
function ConversionForm({ originalAmount, onConfirm, onCancel }) {
  const [amount, setAmount] = useState(originalAmount);
  const [note, setNote] = useState("");

}

// Splits part of an Estimate off as its own Expense, leaving the rest of the
// Estimate active — so more of it can be split off again later, incrementally.
function SplitForm({ estimateAmount, onConfirm, onCancel }) {
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const amt = parseFloat(amount || 0);
  const remaining = parseFloat(estimateAmount || 0) - amt;

  return (
    <div className="mt-2 pt-2 border-t border-[#F0ECE1] space-y-1.5">
      <div className="flex items-center gap-2">
        <label className="text-[10.5px] text-[#8A8377] shrink-0">Split off as Expense (of ${money(estimateAmount)})</label>
        <input value={amount} onChange={(e) => setAmount(e.target.value)} className="input input-sm" style={{ width: "80px" }} placeholder="0.00" />
      </div>
      {amt > 0 && (
        <p className="text-[10px] text-[#8A8377]">
          ${money(Math.max(0, remaining))} will stay as a pending Estimate.
        </p>
      )}
      <input value={note} onChange={(e) => setNote(e.target.value)} className="input input-sm" placeholder="Notes (optional)" />
      <div className="flex gap-1.5 pt-0.5">
        <button onClick={onCancel} className="flex-1 text-[11px] text-[#5B564C] border border-[#E3DDCC] rounded-lg py-1 hover:bg-[#FAF8F3] transition">Cancel</button>
        <button
          onClick={() => { if (amt > 0) onConfirm(amount, note); }}
          className="flex-1 text-[11px] font-medium text-white rounded-lg py-1 transition"
          style={{ backgroundColor: "#8A8377" }}
        >
          Split Off
        </button>
      </div>
    </div>

}

// One ledger line. Estimate rows get a checkmark to convert to Expense in
// full, and a "split" icon to convert only part of it, leaving the rest
// active; Expense rows that came FROM a conversion/split get a reverse-arrows
// icon to undo it, adding the amount back onto the original Estimate.
function TransactionRow({ tx, onDelete, onToggleIncluded, onConvert, onSplit, onReverse, onUpdateField, convertingOpen, onOpenConvert, onCloseConvert, splittingOpen, onOpenSplit, onCloseSplit, isDragging, onDragStart, onDragOver, onDrop, onDragEnd }) {
  const [editing, setEditing] = useState(false);
  const [descDraft, setDescDraft] = useState(tx.description || "");
  const [amountDraft, setAmountDraft] = useState(tx.amount || "");
  const [dateDraft, setDateDraft] = useState(tx.date || "");
  const [notesDraft, setNotesDraft] = useState(tx.notes || "");
  const type = normalizeTxType(tx);
  const included = isTxIncluded(tx);
  const isEstimate = type === "estimate";
  const isExpense = type === "expenditure";
  const isResultOfConversion = !!tx.convertedFrom;
  const hasBeenConverted = !!tx.convertedIntoId;

  const saveEdit = () => {
    if (descDraft !== tx.description) onUpdateField("description", descDraft);
    if (amountDraft !== tx.amount) onUpdateField("amount", amountDraft);
    if (dateDraft !== tx.date) onUpdateField("date", dateDraft);
    if (notesDraft !== (tx.notes || "")) onUpdateField("notes", notesDraft);
    setEditing(false);
  };
  const cancelEdit = () => {
    setDescDraft(tx.description || ""); setAmountDraft(tx.amount || ""); setDateDraft(tx.date || ""); setNotesDraft(tx.notes || "");
    setEditing(false);
  };

  if (editing) {
    return (
      <div className="border border-[#B9924F] rounded-lg px-2 py-1.5 space-y-1">
        <input value={descDraft} onChange={(e) => setDescDraft(e.target.value)} className="input input-sm" placeholder="Description" />
        <div className="flex gap-1">
          <input value={amountDraft} onChange={(e) => setAmountDraft(e.target.value)} className="input input-sm" placeholder="Amount ($)" style={{ flex: 1 }} />
          <input type="date" value={dateDraft} onChange={(e) => setDateDraft(e.target.value)} className="input input-sm" style={{ flex: 1 }} />
        </div>
        <input value={notesDraft} onChange={(e) => setNotesDraft(e.target.value)} className="input input-sm" placeholder="Notes (optional)" />
        <div className="flex gap-1.5 pt-0.5">
          <button onClick={cancelEdit} className="flex-1 text-[11px] text-[#5B564C] border border-[#E3DDCC] rounded-lg py-1 hover:bg-[#FAF8F3] transition">Cancel</button>
          <button onClick={saveEdit} className="flex-1 text-[11px] font-medium text-white rounded-lg py-1" style={{ backgroundColor: "#B9924F" }}>Save</button>
        </div>
      </div>
    );
  }

  return (
    <div
      draggable
      onDragStart={onDragStart}
      onDragOver={(e) => { e.preventDefault(); if (onDragOver) onDragOver(); }}
      onDrop={onDrop}
      onDragEnd={onDragEnd}
      className={`border border-[#F0ECE1] rounded-lg px-2 py-1.5 transition cursor-grab active:cursor-grabbing ${!included ? "opacity-40" : ""} ${isDragging ? "opacity-30" : ""}`}
    >
      <div className="flex items-center gap-1.5">
        <p className="text-[12px] text-[#3F3B34] leading-snug truncate flex-1 min-w-0">
          <span className="font-medium tabular-nums inline-block text-right" style={{ width: "48px", marginRight: "10px" }}>${money(tx.amount)}</span><span className="text-[9px] text-[#C1BBAA]" style={{ marginRight: "10px" }}>{formatDateShort(tx.date)}</span>{tx.description || "—"}
        </p>
        {isEstimate && !hasBeenConverted && (
          <>
            <button onClick={onOpenConvert} title="Mark as spent (all of it)" className="shrink-0 text-[#8A8377] hover:text-[#3F3B34]">
              <Check size={13} />
            </button>
            <button onClick={onOpenSplit} title="Split off part of it as Expense" className="shrink-0 text-[#8A8377] hover:text-[#3F3B34]">
              <SplitIcon size={13} />
            </button>
          </>
        )}
        {isExpense && isResultOfConversion && (
          <button onClick={onReverse} title="Reverse — add this amount back onto the Estimate" className="shrink-0 text-[#8A8377] hover:text-[#3F3B34]">
            <RotateCcw size={12} />
          </button>
        )}
        <button onClick={() => setEditing(true)} title="Edit" className="shrink-0 text-[#C1BBAA] hover:text-[#8A8377]"><Pencil size={12} /></button>
        <button onClick={onDelete} title="Delete" className="shrink-0 text-[#C1BBAA] hover:text-red-400"><X size={12} /></button>
        <ToggleSwitch on={included} onChange={onToggleIncluded} title={included ? "Included in budget — click to exclude" : "Excluded from budget — click to include"} />
      </div>

      {(tx.notes || hasBeenConverted || tx.discrepancyNote) && (
        <p className="text-[10px] text-[#8A8377] mt-1 truncate" style={{ paddingLeft: "58px" }}>
          {tx.notes}
          {hasBeenConverted && <span className="text-[#5B8A6E]">{tx.notes ? " — " : ""}converted to Expense</span>}
          {tx.discrepancyNote && <span>{(tx.notes || hasBeenConverted) ? " — " : ""}{tx.discrepancyNote}</span>}
        </p>
      )}

      {convertingOpen && (
        <ConversionForm originalAmount={tx.amount} onCancel={onCloseConvert} onConfirm={(amount, note) => onConvert(amount, note)} />
      )}
      {splittingOpen && (
        <SplitForm estimateAmount={tx.amount} onCancel={onCloseSplit} onConfirm={(amount, note) => onSplit(amount, note)} />
      )}
    </div>
  );
}

// Add Transaction — fixed to whichever column it was opened from (Estimate or Expense)
function AddTransactionForm({ type, onAdd, onCancel }) {
  const [amount, setAmount] = useState("");
  const [description, setDescription] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));

// Budget amount display: number on top, "+"/"−" icon buttons underneath.
// Each records a fund adjustment (amount + notes) as its own transaction,
// listed in a collapsed-by-default history below.
function BudgetAmountAdjuster({ amount, adjustments, onAdjust, onOverwrite, size = "text-[22px]" }) {
  const [mode, setMode] = useState(null); // null | "add" | "remove"
  const [input, setInput] = useState("");
  const [notes, setNotes] = useState("");
  const [historyOpen, setHistoryOpen] = useState(false);
  const [amountDraft, setAmountDraft] = useState(money(amount));
  useEffect(() => { setAmountDraft(money(amount)); }, [amount]);

  const confirm = () => {
    const delta = parseFloat(input || 0);
    if (delta > 0) onAdjust(mode === "add" ? delta : -delta, notes);
    setInput(""); setNotes(""); setMode(null);
  };

  const saveOverwrite = () => {
    const val = parseFloat(amountDraft || 0);
    if (!isNaN(val) && String(val) !== String(parseFloat(amount || 0))) onOverwrite(String(val));
    setAmountDraft(money(val || 0));
  };

  return (
    <div className="flex flex-col items-center">
      <div className="flex items-center gap-1">
        <span className={`${size} font-semibold text-[#242320]`}>$</span>
        <input
          value={amountDraft}
          onChange={(e) => setAmountDraft(e.target.value)}
          onFocus={(e) => e.target.select()}
          onBlur={saveOverwrite}
          onKeyDown={(e) => { if (e.key === "Enter") e.target.blur(); }}
          title="Click to type a new amount directly"
          className={`${size} font-semibold text-[#242320] tabular-nums bg-transparent border-none outline-none text-center`}
          style={{ width: `${Math.max(3, amountDraft.length + 1)}ch` }}
        />
      </div>
      <div className="flex items-center gap-1.5 mt-1">
        <button onClick={() => setMode(mode === "add" ? null : "add")} title="Add funds" className="w-6 h-6 flex items-center justify-center rounded-full text-[#8A8377] border border-[#C1BBAA] hover:bg-[#FAF8F3]">
          <Plus size={13} />
        </button>
        <button onClick={() => setMode(mode === "remove" ? null : "remove")} title="Remove funds" className="w-6 h-6 flex items-center justify-center rounded-full text-[#8A8377] border border-[#C1BBAA] hover:bg-[#FAF8F3]">
          <Minus size={13} />
        </button>
      </div>

      {mode && (
        <div className="mt-2 p-2 bg-[#FAF8F3] rounded-lg border border-[#E3DDCC] space-y-1.5 w-full">
          <input
            autoFocus
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Escape") setMode(null); }}
            placeholder="Amount ($)"
            className="input input-sm"
          />
          <input value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Notes (optional)" className="input input-sm" />
          <div className="flex gap-1.5">
            <button onClick={() => setMode(null)} className="flex-1 text-[11px] text-[#5B564C] border border-[#E3DDCC] rounded-lg py-1 hover:bg-white transition">Cancel</button>
            <button onClick={confirm} className="flex-1 text-[11px] font-medium text-white rounded-lg py-1" style={{ backgroundColor: "#8A8377" }}>
              {mode === "add" ? "Add" : "Remove"}
            </button>
          </div>
        </div>
      )}

      {adjustments.length > 0 && (
        <div className="w-full mt-2">
          <button onClick={() => setHistoryOpen(!historyOpen)} className="flex items-center gap-1 text-[10px] text-[#ACA692] hover:text-[#8A8377] mx-auto">
            <ChevronDown size={11} style={{ transform: historyOpen ? "rotate(180deg)" : "none", transition: "transform 0.15s" }} />
            {adjustments.length} adjustment{adjustments.length === 1 ? "" : "s"}
          </button>
          {historyOpen && (
            <div className="mt-1.5 space-y-1">
              {adjustments.map((a) => (
                <div key={a.id} className="text-[10px] text-[#8A8377] border border-[#F0ECE1] rounded-md px-2 py-1 flex items-center justify-between gap-2">
                  <span className="text-[#5B564C] font-medium">
                    {a.amount >= 0 ? "+" : "−"}${money(Math.abs(a.amount))}
                  </span>
                  <span className="text-[#C1BBAA]">{formatDateShort(a.date)}</span>
                  {a.notes && <span className="flex-1 min-w-0 truncate text-left">{a.notes}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function BudgetSection({ mainBudgetAmount, onUpdateMainBudget, categories, transactions, adjustments, onAddCategory, onUpdateCategory, onDeleteCategory, onAddTransaction, onDeleteTransaction, onToggleIncluded, onConvertEstimate, onSplitEstimate, onReverseConversion, onAddAdjustment, onUpdateField, onReorderCategories, onReorderTransactions }) {
  const [activeTab, setActiveTab] = useState("overview");
  const [addingCategory, setAddingCategory] = useState(false);
  const [newCatName, setNewCatName] = useState("");
  const [newCatBudget, setNewCatBudget] = useState("");
  const [addingTxType, setAddingTxType] = useState(null);
  const [convertingId, setConvertingId] = useState(null);
  const [splittingId, setSplittingId] = useState(null);
  const [draggedCatId, setDraggedCatId] = useState(null);
  const [draggedTxId, setDraggedTxId] = useState(null);

  const calcForCategory = (categoryId) => {
    const txs = transactions.filter((t) => t.categoryId === categoryId);
    let expense = 0, pending = 0;
    txs.forEach((t) => {
      if (!isTxIncluded(t)) return;
      const type = normalizeTxType(t);
      if (type === "expenditure") expense += parseFloat(t.amount || 0);
      else if (type === "estimate") pending += parseFloat(t.amount || 0);
    });
    return { expense, pending, txs };
  };

  const categoryCalcs = categories.map((c) => ({ cat: c, ...calcForCategory(c.id) }));
  const isCategoryIncluded = (c) => (c.included !== undefined ? c.included : true);

  const grandBudget = parseFloat(mainBudgetAmount || 0);
  const grandExpense = categoryCalcs.filter((c) => isCategoryIncluded(c.cat)).reduce((sum, c) => sum + c.expense, 0);
  const grandPending = categoryCalcs.filter((c) => isCategoryIncluded(c.cat)).reduce((sum, c) => sum + c.pending, 0);
  const grandRemaining = grandBudget - grandExpense - grandPending;
  const grandAdjustments = adjustments.filter((a) => a.categoryId === null);

  const activeCategory = activeTab === "overview" ? null : categories.find((c) => c.id === activeTab);
  const activeCalc = activeCategory ? calcForCategory(activeCategory.id) : null;
  const activeBudget = activeCategory ? parseFloat(activeCategory.budgetAmount || 0) : 0;
  const activeRemaining = activeCategory ? activeBudget - activeCalc.expense - activeCalc.pending : 0;
  const activeAdjustments = activeCategory ? adjustments.filter((a) => a.categoryId === activeCategory.id) : [];

  const renderTxRow = (t) => (
    <TransactionRow
      key={t.id}
      tx={t}
      onDelete={() => onDeleteTransaction(t.id)}
      onToggleIncluded={() => onToggleIncluded(t.id)}
      onUpdateField={(field, value) => onUpdateField(t.id, field, value)}
      convertingOpen={convertingId === t.id}
      onOpenConvert={() => setConvertingId(t.id)}
      onCloseConvert={() => setConvertingId(null)}
      onConvert={(amount, discrepancyNote) => { onConvertEstimate(t.id, amount, discrepancyNote); setConvertingId(null); }}
      splittingOpen={splittingId === t.id}
      onOpenSplit={() => setSplittingId(t.id)}
      onCloseSplit={() => setSplittingId(null)}
      onSplit={(amount, notes) => { onSplitEstimate(t.id, amount, notes); setSplittingId(null); }}
      onReverse={() => onReverseConversion(t.id)}
      isDragging={draggedTxId === t.id}
      onDragStart={() => setDraggedTxId(t.id)}
      onDrop={() => { onReorderTransactions(draggedTxId, t.id); setDraggedTxId(null); }}
      onDragEnd={() => setDraggedTxId(null)}
    />
  );

  const renderTxColumns = (txs) => (
    <div className="grid grid-cols-2 gap-3 mb-1">
      {BUDGET_TYPE_ORDER.map((typeKey) => {
        const meta = BUDGET_TYPE_META[typeKey];
        const colTxs = txs.filter((t) => normalizeTxType(t) === typeKey);
        return (
          <div key={typeKey} className="flex flex-col">
            <p className="text-[10px] font-semibold uppercase tracking-wide mb-1.5 text-center py-1 rounded" style={{ color: meta.color, backgroundColor: meta.bg }}>
              {meta.label}
            </p>
            <div className="space-y-1.5 flex-1">{colTxs.map(renderTxRow)}</div>
            {addingTxType === typeKey ? (
              <AddTransactionForm
                type={typeKey}
                onAdd={(type, amount, desc, date, notes) => { onAddTransaction(activeCategory.id, type, amount, desc, date, notes); setAddingTxType(null); }}
                onCancel={() => setAddingTxType(null)}
              />
            ) : (
              <button
                onClick={() => setAddingTxType(typeKey)}
                className="mt-2 text-[11px] font-medium py-1.5 rounded-lg border border-dashed transition hover:bg-[#FAF8F3]"
                style={{ borderColor: meta.border, color: meta.color }}
              >
                + Add {meta.label}
              </button>
            )}
          </div>
        );
      })}
    </div>
  );

  return (
    <div style={{ fontFamily: "-apple-system, 'Segoe UI', system-ui, sans-serif" }} className="min-h-screen bg-[#F6F4EF] text-[#242320]">
