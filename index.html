// Lets an image thumbnail be dragged out of the app — onto the Desktop, into
// Finder, or into another app like Mail/Word — using the browser's standard
// DownloadURL drag mechanism, with plain-URL fallbacks for browsers that
// support only those.
function handleImageDragStart(e, item, src) {
  if (!src) return;
  try {
    const rawName = (item.title || item.fileName || "image").replace(/[^a-z0-9\-_ ]/gi, "").trim() || "image";
    const mime = src.startsWith("data:") ? src.slice(5, src.indexOf(";")) : "image/png";
    const ext = mime.split("/")[1] || "png";
    e.dataTransfer.setData("DownloadURL", `${mime}:${rawName}.${ext}:${src}`);
    e.dataTransfer.setData("text/uri-list", src);
    e.dataTransfer.setData("text/plain", src);
  } catch (err) {
    // best effort — some browsers restrict certain data types
  }
}

// Finds the product a media item is linked to — either explicitly assigned
// (assignedProductId) or by being used as one of that product's own images.
function findLinkedProduct(item, products) {
  if (!item || !products) return null;
  if (item.assignedProductId) {
    const p = products.find((pr) => pr.id === item.assignedProductId);
    if (p) return p;
  }
  return products.find((pr) => (pr.images || []).includes(item.id)) || null;
}

function mediaIconFor(type, size = 13) {
  if (type === "image") return <ImageIcon size={size} />;
  if (type === "pdf") return <FileText size={size} />;
  if (type === "video") return <Video size={size} />;
  return <Link2 size={size} />;
}

function labelForType(type) {
  if (type === "image") return "Images";
  if (type === "pdf") return "PDFs";
  if (type === "video") return "Videos";
  if (!type) return "Other";
  return type.charAt(0).toUpperCase() + type.slice(1);
}

          {trash.length === 0 ? (

function MediaLibraryModal({ mediaIndex, mediaBlobs, memory, onRememberValue, products, productsByMediaId, inactiveMediaIds, mediaTrash, onRestore, highlightedIds, onToggleHighlight, onClearHighlights, onUpdateItem, onDelete, onReadFiles, onCommit, onAssignToProduct, savedDrafts, onDeleteDraft, onClose }) {
  const [libraryTab, setLibraryTab] = useState("Media"); // "Media" | "Content"
  const [viewingDraft, setViewingDraft] = useState(null);
  const [pendingEdits, setPendingEdits] = useState({}); // mediaId -> { title?, type?, source? }, not applied until Save
  const [editingId, setEditingId] = useState(null); // media item currently open in the double-click edit panel
  const stagePendingEdit = (id, field, value) => setPendingEdits((prev) => ({ ...prev, [id]: { ...(prev[id] || {}), [field]: value } }));
  const getStagedValue = (item, field) => (pendingEdits[item.id]?.[field] !== undefined ? pendingEdits[item.id][field] : (item[field] || ""));

  // Upload / staging
  const [pending, setPending] = useState([]);
  const [linkUrl, setLinkUrl] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const [reading, setReading] = useState(false);

  // Browse / filter
  const [query, setQuery] = useState("");
  const [filterType, setFilterType] = useState("");
  const [filterSource, setFilterSource] = useState("");
  const [filterDate, setFilterDate] = useState("");
  const [filterBrand, setFilterBrand] = useState("");
  const [filterCategory, setFilterCategory] = useState("");

  // Selection
  const [selectMode, setSelectMode] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [highlightMode, setHighlightMode] = useState(false);
  const [confirmingDelete, setConfirmingDelete] = useState(false);
  const [trashOpen, setTrashOpen] = useState(false);

  // Preview
  const [previewId, setPreviewId] = useState(null);
  const [pdfPreviewUrl, setPdfPreviewUrl] = useState(null);
  const [pdfPreviewItem, setPdfPreviewItem] = useState(null);
  const [linkPreview, setLinkPreview] = useState(null);
  const blobUrlRef = useRef(null);
  const browseRef = useRef(null);

  const openPdfPreview = (dataUrl, item) => {
    if (blobUrlRef.current) { URL.revokeObjectURL(blobUrlRef.current); blobUrlRef.current = null; }
    setPdfPreviewItem(item || null);
    if (!dataUrl) return;
    try {
      if (dataUrl.startsWith("data:")) {
        const [, b64] = dataUrl.split(",");
        const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
        const bu = URL.createObjectURL(new Blob([bytes], { type: "application/pdf" }));
        blobUrlRef.current = bu;
        setPdfPreviewUrl(bu);
      } else { setPdfPreviewUrl(dataUrl); }
    } catch { setPdfPreviewUrl(dataUrl); }
  };

  const handleDrop = async (e) => {
    e.preventDefault(); setDragOver(false); setReading(true);
    const staged = await onReadFiles(e.dataTransfer.files);
    setPending((prev) => [...prev, ...staged.map((s) => ({ ...s, assignProductId: "" }))]); setReading(false);
  };

  const handleBrowse = async (e) => {
    setReading(true);
    const staged = await onReadFiles(e.target.files);
    setPending((prev) => [...prev, ...staged.map((s) => ({ ...s, assignProductId: "" }))]); setReading(false);
  };

  const addLink = () => {
    if (!linkUrl.trim()) return;
    const url = ensureProtocol(linkUrl.trim());
    setPending((prev) => [...prev, { tempId: Date.now() + Math.random().toString(36).slice(2), kind: "link", url, title: "", type: "", source: "", assignProductId: "" }]);
    setLinkUrl("");
  };

  const updatePendingField = (tempId, field, value) => {
    setPending((prev) => prev.map((p) => (p.tempId === tempId ? { ...p, [field]: value } : p)));
  };
  const removePending = (tempId) => setPending((prev) => prev.filter((p) => p.tempId !== tempId));

  const commitAll = async () => {
    if (!pending.length) return;
    await onCommit(pending, (results) => {
      // Group newly created ids by which product (if any) they should be assigned to
      const byProduct = {};
      results.forEach(({ id, assignProductId }) => {
        if (!assignProductId) return;
        (byProduct[assignProductId] = byProduct[assignProductId] || []).push(id);
      });
      Object.entries(byProduct).forEach(([productId, ids]) => onAssignToProduct(productId, ids));
    });
    setPending([]);
  };

  const clickTimerRef = useRef(null);

  const handleClick = (item) => {
    if (selectMode) {
      // Highlighted items can't be selected — clear the highlight first
      if ((highlightedIds || new Set()).has(item.id)) return;
      setSelected((prev) => { const n = new Set(prev); n.has(item.id) ? n.delete(item.id) : n.add(item.id); return n; });
      return;
    }
    if (highlightMode) {
      onToggleHighlight(item.id);
      return;
    }
    if (item.kind === "image") { setPreviewId(item.id); return; }
    if (item.kind === "pdf") { openPdfPreview(mediaBlobs[item.id] || item.url, item); return; }
    if (item.url) setLinkPreview({ url: item.url, title: item.title || item.url, id: item.id });
  };

  // Single click is delayed briefly so a following double-click can cancel it —
  // otherwise the single-click preview/select action fires before the dblclick
  // event ever arrives, and the edit panel opens underneath an already-open preview.
  const handleThumbClick = (item) => {
    if (selectMode || highlightMode) { handleClick(item); return; } // bulk actions stay instant
    if (clickTimerRef.current) clearTimeout(clickTimerRef.current);
    clickTimerRef.current = setTimeout(() => { handleClick(item); clickTimerRef.current = null; }, 280);
  };

  const handleThumbDoubleClick = (item) => {
    if (clickTimerRef.current) { clearTimeout(clickTimerRef.current); clickTimerRef.current = null; }
    setEditingId((prev) => (prev === item.id ? null : item.id));
  };

  const distinctTypes   = [...new Set([...(memory.type || []), ...mediaIndex.map((m) => m.type).filter(Boolean)])];
  const distinctSources = [...new Set([...(memory.source || []), ...mediaIndex.map((m) => m.source).filter(Boolean)])];
  const distinctBrands  = [...new Set(products.map((p) => p.brand).filter(Boolean))];
  const distinctCats    = [...new Set(products.map((p) => p.category).filter(Boolean))];
  const dateRanges = [
    { label: "Recently added (7 days)", value: "7d" },
    { label: "Last 30 days", value: "30d" },
    { label: "Last 3 months", value: "90d" },
    { label: "Last year", value: "365d" },
  ];
  const filtered = mediaIndex.filter((m) => {
    const q = query.toLowerCase();
    if (q) {
      // Direct match: the media's own fields + names of products it's used as an image for
      const directMatch = [(m.title || ""), (m.source || ""), (m.type || ""), ...(productsByMediaId[m.id] || [])].some((v) => v.toLowerCase().includes(q));
      // Deeper match: brand/category of whichever product(s) this media is linked to —
      // either explicitly assigned via the Library, or used as one of a product's images.
      const linkedProducts = [
        ...(m.assignedProductId ? [products.find((p) => p.id === m.assignedProductId)] : []),
        ...products.filter((p) => (p.images || []).includes(m.id)),
      ].filter(Boolean);
      const deepMatch = linkedProducts.some((p) => (p.brand || "").toLowerCase().includes(q) || (p.category || "").toLowerCase().includes(q));
      if (!directMatch && !deepMatch) return false;
    }
    if (filterType && m.type !== filterType) return false;
    if (filterSource && m.source !== filterSource) return false;
    if (filterDate) { const ms = { "7d": 7, "30d": 30, "90d": 90, "365d": 365 }[filterDate] * 86400000; if (!m.addedAt || Date.now() - m.addedAt > ms) return false; }
    if (filterBrand || filterCategory) {
      const ap = m.assignedProductId ? products.find((p) => p.id === m.assignedProductId) : null;
      if (filterBrand && ap?.brand !== filterBrand) return false;
      if (filterCategory && ap?.category !== filterCategory) return false;
    }
    return true;
  });

  return (
    <div className="fixed inset-0 bg-black/30 flex items-start justify-center z-50 overflow-y-auto py-3 px-4">
      <div className="bg-white rounded-2xl w-full max-w-5xl my-auto flex flex-col overflow-hidden" style={{ maxHeight: "96vh" }}>

        {/* Header */}
        <div className="flex items-center justify-between px-6 py-3.5 border-b border-[#EAE5D9] shrink-0">
          <h3 className="text-2xl font-semibold text-[#242320] tracking-tight">Library</h3>
          <div className="flex items-center gap-2">
            {libraryTab === "Media" && (

                    <span className="text-[#C1BBAA] mx-1.5">—</span>
                    <span className="font-medium text-[#242320]">{linkedProduct.name}</span>
                    {linkedProduct.description && <><span className="text-[#C1BBAA] mx-1.5">—</span><span className="text-[#8A8377]">{linkedProduct.description}</span></>}
                  </p>
                </div>
              )}
            </div>
          </div>
        ); })()}
          </>
        )}

        {/* Cancel / Save / Save and Close — commits any staged edits (title, type, source) made above */}
        <div className="flex items-center justify-end gap-2 px-6 py-3.5 border-t border-[#EAE5D9] shrink-0">
          <button
            onClick={() => { setPendingEdits({}); setEditingId(null); onClose(); }}
            className="text-[13px] font-medium text-[#5B564C] rounded-full px-4 py-2 hover:bg-[#FAF8F3] transition"
          >
            Cancel
          </button>
          <button
            onClick={() => {
              Object.entries(pendingEdits).forEach(([id, fields]) => {
                Object.entries(fields).forEach(([field, value]) => {
                  if (field === "assignedProductId") { if (value) onAssignToProduct(value, [id]); }
                  else onUpdateItem(id, field, value);
                });
              });
              setPendingEdits({});
              setEditingId(null);
            }}
            className="text-[13px] font-medium rounded-full px-4 py-2 border border-[#B9924F] text-[#B9924F] hover:bg-[#FBEEDA] transition"
          >
            Save
          </button>
          <button
            onClick={() => {
              Object.entries(pendingEdits).forEach(([id, fields]) => {
                Object.entries(fields).forEach(([field, value]) => {
                  if (field === "assignedProductId") { if (value) onAssignToProduct(value, [id]); }
                  else onUpdateItem(id, field, value);
                });
              });
              setPendingEdits({});
              setEditingId(null);
              onClose();
            }}
            className="text-[13px] font-medium text-white rounded-full px-4 py-2 transition"
            style={{ backgroundColor: "#B9924F" }}
          >
            Save and Close
          </button>
        </div>
      </div>
    </div>
  );
}

// Product Quick-View — shows summarised info from Product + Inventory tabs

// Inventory History Report
// ─────────────────────────────────────────────────────────────────────────────
function InventoryHistoryModal({ history, onClose }) {
  const [q, setQ] = useState("");
  const fmt = (ts) => {
    const d = new Date(ts);
    return `${d.getMonth() + 1}/${d.getDate()}/${String(d.getFullYear()).slice(2)}`;
  };
  const num = (v) => parseFloat(String(v).replace(/[^0-9.\-]/g, ""));
  const sorted = [...history].sort((a, b) => b.ts - a.ts);
  const filtered = sorted.filter((e) => {
    if (!q) return true;
    const lq = q.toLowerCase();
    return ((e.sizeLabel || "") + e.field + e.from + e.to).toLowerCase().includes(lq);
  });

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[55] p-6" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full flex flex-col overflow-hidden" style={{ maxWidth: "360px", maxHeight: "52vh" }} onClick={(e) => e.stopPropagation()}>

        {/* Title + search bar on the same line */}
        <div className="flex items-center gap-4 px-4 py-3 border-b border-[#EAE5D9] shrink-0">
          <h3 className="text-[17px] font-semibold text-[#242320] shrink-0">History</h3>
          <div className="flex items-center gap-1.5 bg-[#FAF8F3] border border-[#E3DDCC] rounded-lg px-2 py-1.5 min-w-0" style={{ width: "128px" }}>
            <Search size={10} className="text-[#C1BBAA] shrink-0" />
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search…" className="flex-1 min-w-0 text-[10px] outline-none bg-transparent" />
          </div>
          <button onClick={onClose} className="text-[#C1BBAA] hover:text-[#242320] shrink-0 ml-auto"><X size={16} /></button>
        </div>

        <div className="overflow-y-auto" style={{ flex: "1 1 auto", minHeight: 0 }}>
          {filtered.length === 0 ? (
            <p className="text-center text-[10px] text-[#C1BBAA] py-10">
              {history.length === 0 ? "No changes recorded yet." : "No entries match."}
            </p>
          ) : filtered.map((e) => {
            const isVolume = e.field === "Volume";
            const from = num(e.from), to = num(e.to);
            const isUp = !isVolume && !isNaN(from) && !isNaN(to) && to > from;
            const isDown = !isVolume && !isNaN(from) && !isNaN(to) && to < from;
            return (
              <div key={e.id} className="grid items-baseline gap-2 px-4 py-2 border-b border-[#F4F1EA] last:border-0 hover:bg-[#FAFAF8]" style={{ gridTemplateColumns: "44px 78px 1fr" }}>
                <span className="text-[10px] text-[#ACA692]">{fmt(e.ts)}</span>
                <span className="text-[10px] font-medium text-[#3F3B34] truncate" title={e.sizeLabel}>{e.sizeLabel || "—"}</span>
                <span className="text-[10px] text-[#8A8377] flex items-center gap-1 min-w-0">
                  <span className="truncate">{e.field}</span>
                  <span className="tabular-nums shrink-0">{e.from}</span>
                  <span className={`shrink-0 ${isUp ? "text-[#5B8A6E]" : isDown ? "text-[#C9624A]" : "text-[#C1BBAA]"}`} style={{ fontSize: "7px" }}>
                    {isVolume ? "→" : isDown ? "▼" : "▲"}
                  </span>
                  <span className="tabular-nums font-semibold text-[#B9924F] shrink-0">{e.to}</span>
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ManageCategoriesModal({ categoryCounts, onRename, onDelete, onAdd, onClose }) {

  const [confirmingDelete, setConfirmingDelete] = useState(null); // category pending delete confirmation

  const startRename = (name) => { setEditingName(name); setEditValue(name); };
  const commitRename = () => {
    if (editingName && editValue.trim() && editValue.trim() !== editingName) onRename(editingName, editValue.trim());
    setEditingName(null);
  };
  const addNew = () => {
    if (!newName.trim()) return;
    onAdd(newName.trim());
    setNewName("");
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[65] p-6" onClick={onClose}>

              <div key={name} className="flex items-center gap-2 px-4 py-2.5 border-b border-[#F4F1EA] last:border-0">
                {editingName === name ? (
                  <input

                    onChange={(e) => setEditValue(e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter") commitRename(); if (e.key === "Escape") setEditingName(null); }}

// ─────────────────────────────────────────────────────────────────────────────
// PDF renderer using PDF.js from CDN — renders pages as canvas images
// ─────────────────────────────────────────────────────────────────────────────
// Tries multiple CDN mirrors / versions in sequence — much more resilient
// than pinning to a single cdnjs path that may 404 or be blocked.
const PDFJS_SOURCES = [
  { lib: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js", worker: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js" },
  { lib: "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js", worker: "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js" },
  { lib: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js", worker: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js" },
];

async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  let lastErr = null;
  for (const source of PDFJS_SOURCES) {
    try {
      await new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${source.lib}"]`);
        if (existing) { resolve(); return; }
        const s = document.createElement("script");
        s.src = source.lib;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("Failed to load " + source.lib));
        document.head.appendChild(s);
      });
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = source.worker;
        return window.pdfjsLib;
      }
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("pdf.js failed to load from all sources");
}

function PdfJsViewer({ src }) {
  const [pages, setPages] = useState([]);
  const [status, setStatus] = useState("loading");
  const [errorDetail, setErrorDetail] = useState("");
  const [retryTick, setRetryTick] = useState(0);

  useEffect(() => {
    if (!src) return;
    let cancelled = false;
    setStatus("loading");
    setErrorDetail("");
    (async () => {
      try {
        const pdfjsLib = await loadPdfJs();
        const pdf = await pdfjsLib.getDocument(src).promise;
        const imgs = [];
        for (let i = 1; i <= Math.min(pdf.numPages, 15); i++) {
          if (cancelled) return;
          const page = await pdf.getPage(i);
          const vp = page.getViewport({ scale: 1.4 });
          const canvas = Object.assign(document.createElement("canvas"), { width: vp.width, height: vp.height });
          await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
          imgs.push(canvas.toDataURL("image/jpeg", 0.88));
        }
        if (!cancelled) { setPages(imgs); setStatus("ok"); }
      } catch (e) {
        if (!cancelled) { setErrorDetail(String(e?.message || e)); setStatus("error"); }
      }
    })();
    return () => { cancelled = true; };
  }, [src, retryTick]);

  if (status === "loading") return (
    <div className="flex-1 flex items-center justify-center gap-3 text-[#8A8377]">
      <div style={{ width: 20, height: 20, border: "2px solid #B9924F", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
      <p className="text-[13px]">Rendering PDF…</p>
    </div>
  );
  if (status === "error") return (
    <div className="flex-1 flex flex-col items-center justify-center gap-3 p-6">
      <FileText size={32} className="text-[#C1BBAA]" />
      <p className="text-[13px] text-[#8A8377]">PDF preview couldn't load.</p>
      <div className="flex gap-2">
        <button onClick={() => setRetryTick((t) => t + 1)} className="text-[12px] font-medium text-white rounded-lg px-4 py-2" style={{ backgroundColor: "#B9924F" }}>Try again</button>
        <a href={src} download="document.pdf" className="text-[12px] font-medium text-[#5B564C] border border-[#E0DACB] rounded-lg px-4 py-2">Download PDF</a>
      </div>
      {errorDetail && <p className="text-[9px] text-[#C1BBAA] mt-1 max-w-xs text-center break-words">{errorDetail}</p>}
    </div>
  );
  return (
    <div className="flex-1 overflow-y-auto bg-[#F0ECE1] p-4 space-y-3">
      {pages.map((img, i) => <img key={i} src={img} alt={`Page ${i + 1}`} className="w-full rounded-md shadow-sm" />)}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Inventory Summary Modal — brand filters + bulk Qty on Hand editor
// ─────────────────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
// Bulk Add/Edit — a spreadsheet-style way to create or update many products at
// once, limited to their basic fields (name, brand, description, wholesale,
// retail, default qty, qty on hand). Anything beyond that (sizes/shades,
// media, Shopify, ingredients, etc.) still needs the regular product editor.
// ─────────────────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────────────
// Bulk Edit — a spreadsheet-style way to create or update many products at
// once, in one unified table, limited to their basic fields (name, brand,
// category, description, wholesale, retail, default qty, qty on hand).
// Anything beyond that (sizes/shades, media, ingredients, Shopify, etc.)
// still needs the regular product editor.
// ─────────────────────────────────────────────────────────────────────────────

function BulkProductModal({ products, memory, onRememberValue, onSaveNew, onSaveEdits, onClose }) {
  const blankRow = () => ({
    rowId: Date.now().toString(36) + Math.random().toString(36).slice(2),
    isNew: true,
    name: "", brand: "", category: "", description: "", wholesale: "", retail: "", defaultQty: "", qtyOnHand: "",
  });

  const toRow = (p) => {
    const base = (p.sizes || [])[0] || {};
    return {
      rowId: p.id, isNew: false, id: p.id,
      name: p.name || "", brand: p.brand || "", category: p.category || "", description: p.description || "",
      wholesale: base.wholesale || "", retail: base.retail || "", defaultQty: base.defaultQty || "", qtyOnHand: base.qtyOnHand || "",
    };
  };

  const [rows, setRows] = useState([...products.map(toRow), blankRow(), blankRow(), blankRow()]);
  const [filterBrand, setFilterBrand] = useState("");
  const [filterCategory, setFilterCategory] = useState("");
  const [savedFlash, setSavedFlash] = useState(false);
  const [printPromptOpen, setPrintPromptOpen] = useState(false);
  const [printTimestamp, setPrintTimestamp] = useState(false);
  const [printTitle, setPrintTitle] = useState("Bulk Edit");
  const [confirmedPrintTitle, setConfirmedPrintTitle] = useState("");
  const [confirmedPrintTimestamp, setConfirmedPrintTimestamp] = useState(false);
  const [selectedRowIds, setSelectedRowIds] = useState(new Set());

  // Fields that make sense to bulk-fill across selected rows — Name is
  // deliberately excluded, since product names should stay unique.
  const BULK_FILL_FIELDS = ["brand", "category", "description", "wholesale", "retail", "defaultQty", "qtyOnHand"];

  const toggleRowSelected = (rowId) => {
    setSelectedRowIds((prev) => {
      const next = new Set(prev);
      next.has(rowId) ? next.delete(rowId) : next.add(rowId);
      return next;
    });
  };

  // Editing a field on a row that's part of a multi-selection applies that
  // same value to every other selected row too — e.g. select 4 products,
  // set Brand on one, and it fills in for all 4 at once.
  const updateRow = (rowId, field, value) => {
    const isBulkFillField = BULK_FILL_FIELDS.includes(field);
    const shouldPropagate = isBulkFillField && selectedRowIds.has(rowId) && selectedRowIds.size > 1;
    setRows((prev) => prev.map((r) => {
      if (r.rowId === rowId) return { ...r, [field]: value };
      if (shouldPropagate && selectedRowIds.has(r.rowId)) return { ...r, [field]: value };
      return r;
    }));
  };
  const removeRow = (rowId) => setRows((prev) => prev.filter((r) => r.rowId !== rowId));
  const addMoreRows = (n) => setRows((prev) => [...prev, ...Array.from({ length: n }, blankRow)]);

  const distinctBrands = [...new Set(products.map((p) => p.brand).filter(Boolean))];
  const distinctCats = [...new Set(products.map((p) => p.category).filter(Boolean))];

  const visibleRows = rows.filter((r) => {
    if (r.isNew) return true; // new/blank rows always show, regardless of filter
    if (filterBrand && r.brand !== filterBrand) return false;
    if (filterCategory && r.category !== filterCategory) return false;
    return true;
  });

  const saveAll = () => {
    const newRows = rows.filter((r) => r.isNew && r.name.trim());
    const existingRows = rows.filter((r) => !r.isNew);

    if (newRows.length > 0) {
      const newProducts = newRows.map((r) => ({
        id: Date.now().toString() + Math.random().toString(36).slice(2),
        name: r.name.trim(),
        description: r.description || "",
        brand: r.brand || "",
        category: r.category || "",
        additionalInfo: "",
        shopifyHandle: "",
        images: [],
        isActive: true,
        sizes: [
          {
            id: Math.random().toString(36).slice(2),
            sizeType: "size", size: "", sku: "",
            wholesale: r.wholesale || "", retail: r.retail || "",
            volumeMl: "", volumeOz: "",
            qtyOnHand: r.qtyOnHand || "", qtyAvailable: "", defaultQty: r.defaultQty || "",
            ingredients: "", linkedImageIds: [],
          },
        ],
      }));
      onSaveNew(newProducts);
    }

    if (existingRows.length > 0) {
      const updated = existingRows.map((r) => {
        const original = products.find((p) => p.id === r.id);
        if (!original) return null;
        const baseSize = (original.sizes || [])[0];
        const newSizes = baseSize
          ? original.sizes.map((s, i) => (i === 0 ? { ...s, wholesale: r.wholesale, retail: r.retail, defaultQty: r.defaultQty, qtyOnHand: r.qtyOnHand } : s))
          : [
              {
                id: Math.random().toString(36).slice(2),
                sizeType: "size", size: "", sku: "",
                wholesale: r.wholesale || "", retail: r.retail || "",
                volumeMl: "", volumeOz: "",
                qtyOnHand: r.qtyOnHand || "", qtyAvailable: "", defaultQty: r.defaultQty || "",
                ingredients: "", linkedImageIds: [],
              },
            ];
        return { ...original, name: r.name, brand: r.brand, category: r.category, description: r.description, sizes: newSizes };
      }).filter(Boolean);
      onSaveEdits(updated);
    }

    // Clear out spent new rows, keep a few fresh blanks, refresh existing rows from what was just saved
    setRows([...existingRows, blankRow(), blankRow(), blankRow()]);
    setSavedFlash(true);
    setTimeout(() => setSavedFlash(false), 2000);
  };

  const colTemplate = "24px 1.2fr 0.9fr 0.9fr 1.3fr 70px 70px 70px 70px 28px";

  const openPrintPrompt = () => setPrintPromptOpen(true);
  const confirmPrint = () => {
    setConfirmedPrintTitle(printTitle.trim() || "Bulk Edit");
    setConfirmedPrintTimestamp(printTimestamp);
    setPrintPromptOpen(false);
    setTimeout(() => window.print(), 50);
  };

  return (
    <div className="fixed inset-0 bg-black/30 flex items-start justify-center z-50 overflow-y-auto py-6 px-4">
      <style>{`
        @media print {
          body * { visibility: hidden; }
          #bulk-edit-print, #bulk-edit-print * { visibility: visible; }
          #bulk-edit-print { position: absolute; left: 0; top: 0; width: 100%; max-height: none !important; overflow: visible !important; }
          .no-print { display: none !important; }
        }
      `}</style>
      <div className="bg-white rounded-2xl w-full my-auto flex flex-col overflow-hidden" style={{ maxWidth: "1240px", maxHeight: "88vh" }}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-[#EAE5D9] shrink-0 no-print">
          <h3 className="text-2xl font-semibold text-[#242320] tracking-tight">Bulk Edit</h3>
          <div className="flex items-center gap-2">
            <button onClick={openPrintPrompt} className="text-[11px] text-[#8A8377] border border-[#E3DDCC] rounded-lg px-2.5 py-1 hover:bg-[#FAF8F3] transition">Print</button>
            <button onClick={onClose} className="text-[#C1BBAA] hover:text-[#242320]"><X size={18} /></button>
          </div>
        </div>

        {printPromptOpen && (
          <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-6" style={{ zIndex: 80 }} onClick={() => setPrintPromptOpen(false)}>
            <div className="bg-white rounded-2xl w-full max-w-sm p-5" onClick={(e) => e.stopPropagation()}>
              <h3 className="text-[15px] font-semibold text-[#242320] mb-3">Print Bulk Edit</h3>
              <label className="block text-xs font-medium text-[#8A8377] mb-1.5">Document Title</label>
              <input
                autoFocus
                value={printTitle}
                onChange={(e) => setPrintTitle(e.target.value)}
                onFocus={(e) => e.target.select()}
                className="input mb-3"
                placeholder="Bulk Edit"
              />
              <label className="flex items-center gap-2 text-[12.5px] text-[#5B564C] cursor-pointer mb-4">
                <input type="checkbox" checked={printTimestamp} onChange={(e) => setPrintTimestamp(e.target.checked)} />
                Include a timestamp
              </label>
              <div className="flex gap-2">
                <button onClick={() => setPrintPromptOpen(false)} className="flex-1 text-[13px] font-medium text-[#5B564C] border border-[#E3DDCC] rounded-full py-2 hover:bg-[#FAF8F3] transition">
                  Cancel
                </button>
                <button onClick={confirmPrint} className="flex-1 text-[13px] font-medium text-white rounded-full py-2 transition" style={{ backgroundColor: "#B9924F" }}>
                  Print
                </button>
              </div>
            </div>
          </div>
        )}

        <div id="bulk-edit-print" className="overflow-y-auto flex-1 px-6 py-4">
          {confirmedPrintTitle && (
            <div className="mb-3">
              <h2 className="text-[18px] font-medium text-[#242320]">{confirmedPrintTitle}</h2>
              {confirmedPrintTimestamp && <p className="text-[10px] text-[#8A8377] mt-0.5">Printed {new Date().toLocaleString()}</p>}
            </div>
          )}

        <div className="flex items-center gap-2 pb-3 no-print">
          <span className="text-[10px] font-bold tracking-wider uppercase text-[#8A8377] mr-1">Filter</span>
          <select value={filterBrand} onChange={(e) => setFilterBrand(e.target.value)} className="text-[12px] border border-[#E3DDCC] rounded-lg px-2 py-1 outline-none focus:border-[#B9924F]">
            <option value="">Brand</option>
            {distinctBrands.map((b) => <option key={b} value={b}>{b}</option>)}
          </select>
          <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="text-[12px] border border-[#E3DDCC] rounded-lg px-2 py-1 outline-none focus:border-[#B9924F]">
            <option value="">Category</option>
            {distinctCats.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
          {(filterBrand || filterCategory) && (
            <button onClick={() => { setFilterBrand(""); setFilterCategory(""); }} className="text-[11px] text-[#C1BBAA] hover:text-[#8A8377]">
              Clear
            </button>
          )}
        </div>

        <div className="no-print">
          <p className="text-[11px] text-[#8A8377] mb-3">
            Only basic fields are editable here. New rows (blank, at the bottom) become new products when saved; existing rows update in place.
            Sizes/shades, media, ingredients, and Shopify details still need the regular product editor.
            {" "}Check multiple rows, then edit a field (other than Name) on any one of them — that value fills in for every checked row at once.
            {selectedRowIds.size > 1 && <span className="text-[#B9924F] font-medium"> {selectedRowIds.size} rows selected — bulk-fill is active.</span>}
          </p>
        </div>

          <div className="grid gap-2 px-2 pb-2 text-[9px] font-bold tracking-wider uppercase text-[#8A8377]" style={{ gridTemplateColumns: colTemplate }}>
            <input
              type="checkbox"
              checked={visibleRows.length > 0 && visibleRows.every((r) => selectedRowIds.has(r.rowId))}
              onChange={(e) => {
                setSelectedRowIds((prev) => {
                  const next = new Set(prev);
                  visibleRows.forEach((r) => (e.target.checked ? next.add(r.rowId) : next.delete(r.rowId)));
                  return next;
                });
              }}
              title="Select all"
            />
            <span>Name</span><span>Brand</span><span>Category</span><span>Description</span><span>Wholesale</span><span>Retail</span><span>Default</span><span>On Hand</span><span></span>
          </div>

          <div className="space-y-1.5">
            {visibleRows.map((r) => (
              <div key={r.rowId} className={`grid gap-2 items-center rounded-lg ${selectedRowIds.has(r.rowId) ? "bg-[#FBEEDA]" : r.isNew ? "bg-[#FAF8F3] py-1" : ""}`} style={{ gridTemplateColumns: colTemplate }}>
                <input type="checkbox" checked={selectedRowIds.has(r.rowId)} onChange={() => toggleRowSelected(r.rowId)} />
                <input value={r.name} onChange={(e) => updateRow(r.rowId, "name", e.target.value)} className="input input-sm" placeholder={r.isNew ? "New product name" : ""} />
                <Combobox value={r.brand} onChange={(v) => updateRow(r.rowId, "brand", v)} options={memory.brand || []} placeholder="Brand" inputClassName="input input-sm" onAddNew={(v) => onRememberValue("brand", v)} />
                <Combobox value={r.category} onChange={(v) => updateRow(r.rowId, "category", v)} options={memory.category || []} placeholder="Category" inputClassName="input input-sm" onAddNew={(v) => onRememberValue("category", v)} />
                <input value={r.description} onChange={(e) => updateRow(r.rowId, "description", e.target.value)} className="input input-sm" placeholder="Description" />
                <input value={r.wholesale} onChange={(e) => updateRow(r.rowId, "wholesale", e.target.value)} className="input input-sm" placeholder="0.00" />
                <input value={r.retail} onChange={(e) => updateRow(r.rowId, "retail", e.target.value)} className="input input-sm" placeholder="0.00" />
                <input value={r.defaultQty} onChange={(e) => updateRow(r.rowId, "defaultQty", e.target.value)} className="input input-sm" placeholder="0" />
                <input value={r.qtyOnHand} onChange={(e) => updateRow(r.rowId, "qtyOnHand", e.target.value)} className="input input-sm" placeholder="0" />
                {r.isNew ? (
                  <button onClick={() => removeRow(r.rowId)} className="text-[#C1BBAA] hover:text-red-400 justify-self-center"><X size={13} /></button>
                ) : <span />}
              </div>
            ))}
          </div>
          <button onClick={() => addMoreRows(3)} className="text-[12px] font-medium text-[#B9924F] hover:text-[#8F6B2E] mt-2">
            + Add 3 more rows
          </button>
        </div>

        <div className="flex items-center justify-end gap-2 px-6 py-3.5 border-t border-[#EAE5D9] shrink-0">
          {savedFlash && <span className="text-[12px] text-[#5B8A6E] mr-auto">Saved ✓</span>}
          <button onClick={onClose} className="text-[13px] font-medium text-[#5B564C] rounded-full px-4 py-2 hover:bg-[#FAF8F3] transition">
            Close
          </button>
          <button onClick={saveAll} className="text-[13px] font-medium rounded-full px-4 py-2 border transition" style={{ borderColor: "#B9924F", color: "#B9924F" }}>
            Save All
          </button>
          <button onClick={() => { saveAll(); onClose(); }} className="text-[13px] font-medium text-white rounded-full px-4 py-2 transition" style={{ backgroundColor: "#B9924F" }}>
            Save and Close
          </button>
        </div>
      </div>
    </div>
  );
}

function InventorySummaryModal({ products, summaryBrands, setSummaryBrands, brandCounts, inventorySummary, onInstantUpdate, inventoryHistory, onClose }) {
  const [qtyEdits, setQtyEdits] = useState({});
  const [defEdits, setDefEdits] = useState({});
  const [historyOpen, setHistoryOpen] = useState(false);
  const [search, setSearch] = useState("");
  const [printPromptOpen, setPrintPromptOpen] = useState(false);
  const [printTimestamp, setPrintTimestamp] = useState(false);
  const [printTitle, setPrintTitle] = useState("Inventory Summary");
  const [confirmedPrintTitle, setConfirmedPrintTitle] = useState("");
  const [confirmedPrintTimestamp, setConfirmedPrintTimestamp] = useState(false);

  const allRows = products.flatMap((p) =>
    (p.sizes || []).map((s, si) => {
      const w = parseFloat(s.wholesale || 0);
      const avail = parseFloat(s.qtyAvailable || 0);
      const def = parseFloat(s.defaultQty || 0);
      return { p, s, si, w, avail, def,
        valueAvail: w * avail, valueDef: w * def,
        diff: (def - avail) * w, key: `${p.id}:${s.id}` };
    })
  );

  const rows = allRows.filter((r) => {
    if (!search.trim()) return true;
    const q = search.trim().toLowerCase();
    return (r.p.name || "").toLowerCase().includes(q)
      || (r.p.description || "").toLowerCase().includes(q)
      || (r.p.brand || "").toLowerCase().includes(q)
      || (r.p.category || "").toLowerCase().includes(q)
      || (r.s.size || "").toLowerCase().includes(q);
  });

  const totalValueAvail = rows.reduce((a, r) => a + r.valueAvail, 0);
  const totalValueDef   = rows.reduce((a, r) => a + r.valueDef, 0);
  const totalDiff       = rows.reduce((a, r) => a + r.diff, 0);
  const totalOnHand     = rows.reduce((a, r) => a + parseFloat(r.s.qtyOnHand || 0), 0);

  // Applying always logs to history — instantInventoryUpdate records the change automatically.
  const applyQtyEdits = () => {
    Object.entries(qtyEdits).forEach(([key, val]) => {
      const [pid, sid] = key.split(":");
      onInstantUpdate(pid, sid, "qtyOnHand", val);
    });
    setQtyEdits({});
  };

  const applyDefEdits = () => {
    Object.entries(defEdits).forEach(([key, val]) => {
      const [pid, sid] = key.split(":");
      onInstantUpdate(pid, sid, "defaultQty", val);
    });
    setDefEdits({});
  };

  const applyAll = () => {
    applyDefEdits();
    applyQtyEdits();

  const openPrintPrompt = () => setPrintPromptOpen(true);

    setConfirmedPrintTitle(printTitle.trim() || "Inventory Summary");

    setPrintPromptOpen(false);

  // Product | Description | Brand | Category | Size/Shade | Qty Available | Qty Default | Difference | Qty on Hand

        {/* Title — Search — Print/History/Close, all in one row */}

// Clipboard copy with textarea fallback (works in sandboxed iframes)
function copyText(text) {
  // Try modern async clipboard API
  if (typeof navigator !== "undefined" && typeof navigator.clipboard?.writeText === "function") {
    navigator.clipboard.writeText(text)
      .catch(() => legacyCopy(text));
    return;
  }
  legacyCopy(text);
}
function legacyCopy(text) {
  // execCommand approach — works in most sandboxed iframes
  try {
    const el = document.createElement("textarea");
    el.value = text;
    el.setAttribute("readonly", "");
    el.style.cssText = "position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;";
    document.body.appendChild(el);
    el.focus();
    el.select();
    el.setSelectionRange(0, el.value.length);
    const ok = document.execCommand("copy");
    document.body.removeChild(el);
    if (!ok) throw new Error("execCommand returned false");
  } catch (e) {
    // Last resort: show in a prompt so the user can manually copy
    window.prompt("Copy this URL:", text);
  }
}

// Copy button for selected media — shows 2-sec checkmark, copies URLs for links/PDFs
function MediaCopyButton({ selected, mediaIndex, mediaBlobs, disabled = false }) {
  const [copyState, setCopyState] = useState(null); // null | "image" | "text"

  const buildPngBlob = async (src) => {
    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      // Only needed for genuine cross-origin http(s) sources — setting it
      // on data:/blob: URLs can cause unnecessary load failures in some engines.
      if (/^https?:/.test(src)) im.crossOrigin = "anonymous";
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = src;
    });
    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth || img.width;
    canvas.height = img.naturalHeight || img.height;
    canvas.getContext("2d").drawImage(img, 0, 0);
    return await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
  };

  const handle = async () => {
    if (disabled) return;
    const ids = [...selected];
    // Single image: convert to PNG via canvas before writing — many browsers
    // (Chrome included) reject ClipboardItem writes for jpeg/webp/etc and only
    // reliably accept image/png, so re-encoding fixes real-world paste failures.
    if (ids.length === 1) {
      const item = mediaIndex.find((m) => m.id === ids[0]);
      const src = item ? (mediaBlobs[ids[0]] || item.url) : null;
      if (item?.kind === "image" && src && navigator.clipboard?.write && typeof ClipboardItem !== "undefined") {
        try {
          // Critical: navigator.clipboard.write() must be CALLED synchronously within
          // the click handler for Safari (and some other browsers) to honor the
          // user-gesture permission. Passing a Promise as the record's value lets the
          // actual PNG bytes resolve asynchronously afterward, while write() itself
          // fires immediately. Awaiting the blob first (as before) let the gesture
          // context expire by the time write() was finally called — that was the bug.
          await navigator.clipboard.write([
            new ClipboardItem({ "image/png": buildPngBlob(src) })
          ]);
          setCopyState("image"); setTimeout(() => setCopyState(null), 2200); return;
        } catch (e) {
          // Falls through to text copy below — this browser/context doesn't allow
          // real image clipboard writes (common in non-secure or restricted contexts).
        }
      }
    }
    // Fallback: links copy their URL (the actual, pasteable link); everything
    // else copies title + URL as a text reference.
    const lines = ids.map((id) => {
      const it = mediaIndex.find((m) => m.id === id);
      if (!it) return "";
      if (it.kind === "link") return ensureProtocol(it.url) || it.title || id;
      if (it.kind === "pdf" || it.kind === "video") return (it.title || it.fileName || it.kind) + (it.url ? "\n" + it.url : "");
      return it.title || it.fileName || id;
    }).filter(Boolean).join("\n\n");
    copyText(lines);
    setCopyState("text"); setTimeout(() => setCopyState(null), 2200);
  };
  return (
    <button type="button" onClick={handle} disabled={disabled} title={copyState === "text" ? "This browser blocked a real image copy — copied as a text reference instead" : undefined}
      className={`flex items-center gap-1 text-[11px] font-semibold uppercase tracking-wide px-2.5 py-1 rounded-lg border transition ${disabled ? "border-[#E3DDCC] text-[#C1BBAA] cursor-not-allowed" : copyState === "image" ? "border-[#5B8A6E] text-[#5B8A6E] bg-[#EBF5EF]" : copyState === "text" ? "border-[#C9A227] text-[#8A6D14] bg-[#FDF7E3]" : "border-[#E3DDCC] text-[#5B564C] hover:bg-[#FAF8F3]"}`}>
      {copyState ? <Check size={10} /> : <Copy size={10} />} {copyState === "image" ? "Copied!" : copyState === "text" ? "Copied as text" : "Copy"}
    </button>
  );
}

  const buildSystemPrompt = () => {

PRODUCT CATALOG:
${catalog || "No products yet."}

Help the user draft marketing copy, product descriptions, social captions, emails, presentations, or any other written content, grounded in this catalog and the material above. Reference specific products, brands, PDFs, and link content by name where relevant. Ask a clarifying question only if the request is genuinely ambiguous — otherwise produce a complete draft.`;

      }).filter(Boolean);

    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[70] p-6" onClick={onClose}>

              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


function PdfAiPanel({ item, base64, onClose }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  const send = async () => {
    const q = input.trim();
    if (!q || loading) return;
    setInput("");
    const userMsg = { role: "user", content: q };
    const updated = [...messages, userMsg];
    setMessages(updated);
    setLoading(true);
    try {
      // Build API messages: first turn includes the document, later turns are text only
      const apiMessages = updated.map((m, i) => {
        if (m.role === "user" && i === 0 && base64) {
          return {
            role: "user",
            content: [
              { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } },
              { type: "text", text: m.content }
            ]
          };
        }
        return { role: m.role, content: m.content };
      });
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: "You are a helpful assistant. The user has shared a PDF document from their product catalog. Answer questions about its content concisely.",
          messages: apiMessages,
        }),
      });
      const data = await res.json();
      const reply = data.content?.map((b) => b.text || "").join("") || "No response.";
      setMessages([...updated, { role: "assistant", content: reply }]);
    } catch (e) {
      setMessages([...updated, { role: "assistant", content: "Error: " + e.message }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[65] p-6" onClick={onClose}>
      <div className="bg-white rounded-2xl overflow-hidden flex flex-col" style={{ width: "min(90vw,520px)", height: "min(85vh,580px)" }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-4 py-3 border-b border-[#EAE5D9] shrink-0">
          <div className="flex items-center gap-2">
            <Sparkles size={14} className="text-[#B9924F]" />
            <p className="text-[13px] font-medium text-[#3F3B34]">Ask AI about this PDF</p>
          </div>
          <div className="flex items-center gap-2">
            <p className="text-[10px] text-[#C1BBAA] truncate max-w-[140px]">{item.title || item.fileName}</p>
            <button onClick={onClose} className="text-[#C1BBAA] hover:text-[#242320]"><X size={15} /></button>
          </div>
        </div>
        {/* Messages */}
        <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3">
          {messages.length === 0 && (
            <div className="h-full flex flex-col items-center justify-center text-center text-[#C1BBAA] gap-2">
              <Sparkles size={24} className="text-[#EDCF9A]" />
              <p className="text-[12px]">Ask anything about this PDF — Claude has already read it.</p>
            </div>
          )}
          {messages.map((m, i) => (
            <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
              <div className={`max-w-[85%] rounded-xl px-3 py-2 text-[12px] leading-relaxed ${m.role === "user" ? "text-white" : "bg-[#FAF8F3] text-[#3F3B34] border border-[#EAE5D9]"}`} style={m.role === "user" ? { backgroundColor: "#B9924F" } : {}}>
                {m.content}
              </div>
            </div>
          ))}
          {loading && (
            <div className="flex justify-start">
              <div className="bg-[#FAF8F3] border border-[#EAE5D9] rounded-xl px-3 py-2 text-[12px] text-[#C1BBAA] italic">Thinking…</div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
        {/* Input */}
        <div className="px-4 py-3 border-t border-[#EAE5D9] shrink-0 flex gap-2">
          <input
            value={input}
            onChange={(e) => setInput(e.target.value)}

          />
          <button
            onClick={send}
            disabled={!input.trim() || loading}
            className="text-[12px] font-medium text-white rounded-lg px-4 py-2 disabled:opacity-40"
            style={{ backgroundColor: "#B9924F" }}
          >
            Send
          </button>
        </div>
      </div>
    </div>
  );
}
