    if (pending.length === 0) return;
    // Every item staged from within THIS product's Media tab gets tagged as
    // belonging to this product (assignProductId), so it's deep-searchable by
    // this product's brand/category in the Library — not just images picked
    // into the product's 4-image carousel.
    await onCommit(pending, (results) => {
      if (!onAssignToProduct) return;
      results.forEach(({ id, assignProductId }) => {
        if (assignProductId) onAssignToProduct(assignProductId, [id]);
      });
    });
    setPending([]);
  };

  const selectedImages = draft.images || [];

  const distinctTypes   = [...new Set([...(memory.type || []), ...mediaIndex.map((m) => m.type).filter(Boolean)])];
  const distinctSources = [...new Set([...(memory.source || []), ...mediaIndex.map((m) => m.source).filter(Boolean)])];
  const dateRanges = [
    { label: "Recently added (7 days)", value: "7d" },
    { label: "Last 30 days", value: "30d" },
    { label: "Last 3 months", value: "90d" },
    { label: "Last year", value: "365d" },
  ];

  const filteredLibrary = mediaIndex.filter((m) => {
    // Scoped to THIS product only — either explicitly assigned to it, or
    // already attached as one of its own images. The global Media Library
    // (a separate modal) still shows everything, unfiltered by product.
    const belongsToThisProduct = m.assignedProductId === draft.id || (draft.images || []).includes(m.id);
    if (!belongsToThisProduct) return false;
    if (filterType && m.type !== filterType) return false;
    if (filterSource && m.source !== filterSource) return false;
    if (filterDate) {
      const daysMs = { "7d": 7, "30d": 30, "90d": 90, "365d": 365 }[filterDate] * 86400000;
      if (!m.addedAt || Date.now() - m.addedAt > daysMs) return false;
    }
    return true;
  });

  return (
    <div className="space-y-4">
      {/* Left: drag-and-drop over paste-a-link, stacked. Right: filters, stacked. */}
      <div className="grid gap-2.5" style={{ gridTemplateColumns: "1fr 128px" }}>
        <div className="space-y-2.5">
          <div
            onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={handleDrop}
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            className={`rounded-lg border border-dashed px-3 py-4 cursor-pointer transition flex flex-col items-center justify-center gap-1 text-center ${
              dragOver ? "border-[#B9924F] bg-[#FBEEDA]" : "border-[#DDD6C4] bg-[#FAF8F3] hover:border-[#B9924F]"
            }`}
          >
            <input
              ref={fileInputRef}
              type="file"
              multiple
              accept="image/*,.pdf,application/pdf,video/*"
              className="hidden"
              onChange={handleBrowse}
            />
            <UploadCloud size={15} className="text-[#B9924F]" />
            <p className="text-[12px] text-[#5B564C] leading-snug">
              {reading ? "Reading files..." : "Drag & drop, or click to browse"}
            </p>
          </div>
          <div className="rounded-lg border border-[#E3DDCC] px-3 py-4 flex items-center gap-2">
            <input
              value={linkUrl}
              onChange={(e) => setLinkUrl(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addLinkToPending(); } }}
              placeholder="Paste a URL and press Enter"
              className="input"
            />
            <button
              type="button"
              onClick={addLinkToPending}
              className="shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-white"
              style={{ backgroundColor: "#B9924F" }}
            >
              <Plus size={14} />
            </button>
          </div>
        </div>

        <div className="space-y-1.5">
          <div className="flex rounded-lg overflow-hidden border border-[#E3DDCC]">
            <div className="w-1/3 shrink-0 bg-[#F0EADA] flex items-center justify-center py-1.5">
              <Filter size={10} className="text-[#B9924F]" />
            </div>
            <select
              value={filterType}
              onChange={(e) => setFilterType(e.target.value)}
              className="w-2/3 appearance-none bg-[#FAF8F3] pl-1.5 pr-1 py-1.5 text-[12px] text-[#5B564C] leading-snug outline-none cursor-pointer"
            >
              <option value="">Type</option>
              {(memory.type || []).map((t) => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div className="flex rounded-lg overflow-hidden border border-[#E3DDCC]">
            <div className="w-1/3 shrink-0 bg-[#F0EADA] flex items-center justify-center py-1.5">
              <Filter size={10} className="text-[#B9924F]" />
            </div>
            <select
              value={filterSource}
              onChange={(e) => setFilterSource(e.target.value)}
              className="w-2/3 appearance-none bg-[#FAF8F3] pl-1.5 pr-1 py-1.5 text-[12px] text-[#5B564C] leading-snug outline-none cursor-pointer"
            >
              <option value="">Source</option>
              {(memory.source || []).map((s) => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="flex rounded-lg overflow-hidden border border-[#E3DDCC]">
            <div className="w-1/3 shrink-0 bg-[#F0EADA] flex items-center justify-center py-1.5">
              <Filter size={10} className="text-[#B9924F]" />
            </div>
            <select
              value={filterDate}
              onChange={(e) => setFilterDate(e.target.value)}
              className="w-2/3 appearance-none bg-[#FAF8F3] pl-1.5 pr-1 py-1.5 text-[12px] text-[#5B564C] leading-snug outline-none cursor-pointer"
            >
              <option value="">Date</option>
              {dateRanges.map((r) => <option key={r.value} value={r.value}>{r.label}</option>)}
            </select>
          </div>
          <button
            type="button"
            onClick={() => { setFilterType(""); setFilterSource(""); setFilterDate(""); }}
            className="flex rounded-lg overflow-hidden border border-[#E3C7C2] w-full"
          >
            <span className="w-1/3 shrink-0 bg-[#F3E1DE] flex items-center justify-center py-1.5">
              <X size={10} className="text-[#B9604F]" />
            </span>
            <span className="w-2/3 bg-[#FCF7F6] pl-1.5 pr-1 py-1.5 text-[12px] text-[#5B564C] leading-snug text-left">
              Clear Filters
            </span>
          </button>
        </div>
      </div>

      {/* Staging area — nothing here is in the library yet, each item has its own fields */}
      {pending.length > 0 && (
        <div className="p-3 rounded-lg border border-dashed border-[#DDD6C4] bg-[#FAF8F3] space-y-2">
          <p className="text-[11px] font-semibold text-[#8A8377]">Ready to add ({pending.length}) — fill in each one, then add to library</p>
          <div className="space-y-2">
            {pending.map((p) => (
              <div key={p.tempId} className="flex items-center gap-2 p-2 rounded-lg bg-white border border-[#E9E4D8]">
                <div style={{ width: "44px", height: "44px" }} className="relative shrink-0 rounded-md overflow-hidden bg-[#F3F1EA] flex items-center justify-center text-[#C1BBAA]">
                  {p.kind === "image" && p.dataUrl ? (
                    <img src={p.dataUrl} alt="pending" className="w-full h-full object-cover" />
                  ) : (
                    mediaIconFor(p.kind, 14)
                  )}
                </div>
                <input
                  value={p.title}
                  onChange={(e) => updatePendingField(p.tempId, "title", e.target.value)}
                  placeholder="Title"
                  className="input input-sm flex-1"
                />
                <Combobox
                  value={p.type}
                  onChange={(v) => updatePendingField(p.tempId, "type", v)}
                  options={memory.type || []}
                  placeholder="Type"
                  inputClassName="input input-sm flex-1"
                  onAddNew={(v) => onRememberValue("type", v)}
                />
                <Combobox
                  value={p.source}
                  onChange={(v) => updatePendingField(p.tempId, "source", v)}
                  options={memory.source || []}
                  placeholder="Source"
                  inputClassName="input input-sm flex-1"
                  onAddNew={(v) => onRememberValue("source", v)}
                />
                <button
                  type="button"
                  onClick={() => removePending(p.tempId)}
                  className="shrink-0 text-[#C1BBAA] hover:text-red-400"
                >
                  <X size={14} />
                </button>
              </div>
            ))}
          </div>
          <button
            type="button"
            onClick={commitAll}
            className="text-[12.5px] text-white font-medium rounded-lg px-3.5 py-1.5"
            style={{ backgroundColor: "#B9924F" }}
          >
            Add {pending.length} to library
          </button>
        </div>
      )}

      {/* Committed library — click to preview big, double-click to edit */}
      <div className="border-t border-[#EAE5D9] pt-3.5">
        {pickingImages && (
          <div className="flex items-center justify-between px-3 py-2 rounded-lg bg-[#FBEEDA] border border-[#B9924F] mb-3">
            <p className="text-[12px] text-[#8F6B2E]">
              Choose 3–4 images for this product — click an image to select it ({selectedImages.length}/4)
            </p>
            <button
              type="button"
              onClick={onDonePicking}
              className="text-[12px] font-medium text-white rounded-lg px-3 py-1"
              style={{ backgroundColor: "#B9924F" }}
            >
              Done
            </button>
          </div>
        )}

        {/* Select and Highlight — two independent, always-present toggle buttons */}
        {!pickingImages && (
          <div className="flex items-center gap-1.5 mb-3 flex-wrap">
            {/* Select — blue frame on clicked media; brings up Copy and Delete */}
            <button
              type="button"
              onClick={() => {
                if (selectMode) { setSelectMode(false); setSelected(new Set()); }
                else { setSelectMode(true); setHighlightMode(false); }
              }}
              className="text-[12px] font-semibold uppercase tracking-wide px-3 py-1.5 rounded-lg transition"
              style={selectMode
                ? { border: "2px solid #1F5A7A", backgroundColor: "#EAF3F8", color: "#1F5A7A", width: "96px", textAlign: "center" }
                : { border: "2px solid #D8D2C2", backgroundColor: "transparent", color: "#8A8377", width: "96px", textAlign: "center" }}
            >
              Select
            </button>
            {/* Highlight — yellow frame on clicked media; persists as an AI reference marker */}
            <button
              type="button"
              onClick={() => {
                if (highlightMode) setHighlightMode(false);
                else { setHighlightMode(true); setSelectMode(false); setSelected(new Set()); }
              }}
              className="text-[12px] font-semibold uppercase tracking-wide px-3 py-1.5 rounded-lg transition"
              style={highlightMode
                ? { border: "2px solid #8E241A", backgroundColor: "#FDEEEC", color: "#8E241A", width: "96px", textAlign: "center" }
                : { border: "2px solid #D8D2C2", backgroundColor: "transparent", color: "#8A8377", width: "96px", textAlign: "center" }}
            >
              Highlight
            </button>
            {selectMode && (
              <>
                <MediaCopyButton selected={selected} mediaIndex={mediaIndex} mediaBlobs={mediaBlobs} disabled={selected.size === 0} />
                <SelectDeleteButton
                  count={selected.size}
                  disabled={selected.size === 0}
                  blockedCount={0}
                  onConfirm={() => {
                    selected.forEach((id) => onDelete(id));
                    setSelected(new Set());
                    setSelectMode(false);
                  }}
                />
              </>
            )}
          </div>
        )}

        {/* Thumbnails */}
        <div>
          {filteredLibrary.length > 0 ? (
              <div className="flex flex-wrap gap-2">
                {filteredLibrary.map((item) => {
                  const isImage = item.kind === "image";
                  const src = isImage ? mediaBlobs[item.id] || item.url : null;
                  const isSelected = selectedImages.includes(item.id);
                  const isMultiSelected = selected.has(item.id);
                  const isHighlighted = (highlightedIds || new Set()).has(item.id);
                  const thumbBorderStyle =
                    editingId === item.id ? { width: "92px", height: "92px", border: "1px solid #B9924F", boxShadow: "0 0 0 1px #B9924F" }
                    : isMultiSelected ? { width: "92px", height: "92px", border: "2px solid #4B8DB5", boxShadow: "0 0 0 2px rgba(75,141,181,0.35)" }
                    : isHighlighted ? { width: "92px", height: "92px", border: "2px solid #C0392B", boxShadow: "0 0 0 2px rgba(192,57,43,0.35)" }
                    : isSelected ? { width: "92px", height: "92px", border: "1px solid #B9924F", boxShadow: "0 0 0 1px #B9924F" }
                    : { width: "92px", height: "92px", border: "1px solid #E9E4D8" };
                  return (
                    <div
                      key={item.id}
                      draggable
                      onDragStart={(e) => {
                        // Multi-select drag: include all selected items' data
                        const ids = (selectMode && isMultiSelected && selected.size > 1)
                          ? [...selected]
                          : [item.id];
                        const urls = [];
                        ids.forEach((id) => {
                          const it = mediaIndex.find((m) => m.id === id);
                          if (!it) return;
                          if (it.kind === "image") {
                            const s2 = mediaBlobs[id] || it.url;
                            if (s2) urls.push(s2);
                          } else {
                            const u = it.kind === "pdf" ? (mediaBlobs[id] || it.url) : it.url;
                            if (u) urls.push(u);
                          }
                        });
                        if (ids.length === 1) {
                          const solo = mediaIndex.find((m) => m.id === ids[0]);
                          if (solo?.kind === "image") {
                            const s2 = mediaBlobs[ids[0]] || solo.url;
                            if (s2) handleImageDragStart(e, solo, s2);
                          } else if (urls[0]) {
                            try {
                              e.dataTransfer.setData("text/uri-list", urls[0]);
                              e.dataTransfer.setData("text/plain", urls[0]);
                              if (solo?.kind === "pdf" && urls[0].startsWith("data:")) {
                                const name = (solo.title || solo.fileName || "document") + ".pdf";
                                e.dataTransfer.setData("DownloadURL", `application/pdf:${name}:${urls[0]}`);
                              }
                            } catch (err) {}
                          }
                        } else if (urls.length > 0) {
                          try {
                            e.dataTransfer.setData("text/uri-list", urls.join("\r\n"));
                            e.dataTransfer.setData("text/plain", urls.join("\n"));
                          } catch (err) {}
                        }
                      }}
                      onClick={() => {
                        if (pickingImages && isImage) {
                          onToggleImage(item.id);
                        } else {
                          handleThumbClick(item);
                        }
                      }}
                      onDoubleClick={() => handleThumbDoubleClick(item.id)}
                      style={thumbBorderStyle}
                      className="group relative shrink-0 rounded-md overflow-hidden bg-[#F3F1EA] flex items-center justify-center text-[#C1BBAA] cursor-pointer"
                    >
                      {isImage && src ? (
                        <img src={src} alt={item.title || "media"} draggable={false} className="w-full h-full object-cover" />
                      ) : (
                        mediaIconFor(item.kind, 20)
                      )}
                      {/* Multi-select — ring border shows selection; no corner icon */}
                      {pickingImages && isImage && isSelected && (
                        <div className="absolute top-1 left-1 w-4 h-4 rounded-full bg-[#B9924F] text-white flex items-center justify-center">
                          <Check size={10} />
                        </div>
                      )}
                      {/* Download button on hover — reliable cross-app transfer */}
                      {!selectMode && !pickingImages && (() => {
                        const dlSrc = isImage ? src : (mediaBlobs[item.id] || item.url);
                        if (!dlSrc) return null;
                        const dlName = (item.title || item.fileName || "media") +
                          (item.kind === "pdf" ? ".pdf" : item.kind === "image" ? (dlSrc.includes("png") ? ".png" : ".jpg") : "");
                        return (
                          <a
                            href={dlSrc}
                            download={dlName}
                            onClick={(e) => e.stopPropagation()}
                            className="absolute bottom-1 right-1 w-4 h-4 rounded-sm bg-black/50 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition hover:bg-[#B9924F]"
                            title="Download"
                          >
                            <Download size={8} />
                          </a>
                        );
                      })()}
                      {/* AI button — PDFs only */}
                      {!selectMode && !pickingImages && item.kind === "pdf" && (() => {
                        const blobData = mediaBlobs[item.id];
                        const base64 = blobData?.startsWith("data:") ? blobData.split(",")[1] : null;
                        return (
                          <button
                            type="button"
                            title="Ask AI about this PDF"
                            onClick={(e) => { e.stopPropagation(); setPdfAiItem({ item, base64 }); }}
                            className="absolute bottom-1 left-1 w-4 h-4 rounded-sm bg-black/50 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition hover:bg-[#B9924F]"
                          >
                            <Sparkles size={8} />
                          </button>
                        );
                      })()}
                      {/* Title on hover */}
                      <div className="absolute inset-x-0 bottom-0 bg-black/65 text-white text-[8px] leading-tight px-1 py-0.5 opacity-0 group-hover:opacity-100 transition truncate">
                        {item.title || "Untitled"}
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <p className="text-center text-sm text-[#C1BBAA] py-6">
                {mediaIndex.length === 0 ? "No media yet — drag in files or paste a link above." : "No media matches these filters."}
              </p>
            )}

            {/* Edit panel — opened by double-clicking a thumbnail */}
            {editingId && (() => {
              const item = mediaIndex.find((m) => m.id === editingId);
              if (!item) return null;
              const isImage = item.kind === "image";
              const src = isImage ? mediaBlobs[item.id] || item.url : null;
              return (
                <div className="mt-3 rounded-xl border border-[#B9924F] bg-[#FBEEDA] overflow-hidden">
                  {/* Header row with title and controls */}
                  <div className="flex items-center justify-between px-3 py-2 border-b border-[#EDCF9A]">
                    <div className="flex items-center gap-2 min-w-0">
                      <span className="text-[9px] font-semibold tracking-wide text-[#B9924F] uppercase">Edit Media</span>
                      {item.code && <span className="text-[9px] text-[#C9A96A]">#{item.code}</span>}
                    </div>
                    <div className="flex items-center gap-1.5 shrink-0">
                      <button
                        type="button"
                        onClick={() => setEditingId(null)}
                        className="text-[11px] font-medium text-white rounded-lg px-3 py-1"
                        style={{ backgroundColor: "#B9924F" }}
                      >
                        Save
                      </button>
                      <button
                        type="button"
                        onClick={() => setEditingId(null)}
                        className="w-6 h-6 flex items-center justify-center rounded-lg text-[#B9924F] hover:bg-[#F5D9A0] transition"
                      >
                        <X size={13} />
                      </button>
                    </div>
                  </div>
                  {/* Body */}
                  <div className="flex gap-3 p-3">
                    <div style={{ width: "72px", height: "72px" }} className="relative shrink-0 rounded-md overflow-hidden bg-[#F3F1EA] border border-[#EDCF9A] flex items-center justify-center text-[#C1BBAA]">
                      {isImage && src ? <img src={src} alt="" className="w-full h-full object-cover" /> : mediaIconFor(item.kind, 20)}
                      {isImage && (
                        <>
                          <input
                            ref={replaceInputRef}
                            type="file"
                            accept="image/*"
                            className="hidden"
                            onChange={(e) => { if (e.target.files[0]) onReplaceImage(item.id, e.target.files[0]); e.target.value = ""; }}
                          />
                          <button
                            type="button"
                            onClick={() => replaceInputRef.current && replaceInputRef.current.click()}
                            className="absolute inset-x-0 bottom-0 bg-black/55 text-white text-[8px] py-0.5 hover:bg-black/70 transition text-center"
                          >
                            Replace
                          </button>
                        </>
                      )}
                    </div>
                    <div className="flex-1 grid grid-cols-3 gap-2 items-start content-start">
                      <input
                        value={item.title || ""}
                        onChange={(e) => onUpdateItem(item.id, "title", e.target.value)}
                        placeholder="Title"
                        className="input input-sm col-span-3"
                      />
                      <Combobox
                        value={item.type || ""}
                        onChange={(v) => onUpdateItem(item.id, "type", v)}
                        options={memory.type || []}
                        placeholder="Type"
                        inputClassName="input input-sm"
                        onAddNew={(v) => onRememberValue("type", v)}
                      />
                      <Combobox
                        value={item.source || ""}
                        onChange={(v) => onUpdateItem(item.id, "source", v)}
                        options={memory.source || []}
                        placeholder="Source"
                        inputClassName="input input-sm"
                        onAddNew={(v) => onRememberValue("source", v)}
                      />
                    </div>
                  </div>
                </div>
              );
            })()}
        </div>
      </div>

        {/* Link preview — compact */}
        {linkPreview && (() => {
          const linkedItem = mediaIndex.find((m) => m.id === linkPreview.id);
          const linkedProduct = linkedItem ? findLinkedProduct(linkedItem, products) : null;
          return (
          <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] p-6" onClick={() => setLinkPreview(null)}>
            <div className="w-full max-w-sm" onClick={(e) => e.stopPropagation()}>
              <LinkCopyButtons url={ensureProtocol(linkPreview.url)} onClose={() => setLinkPreview(null)} />
              {linkedProduct && (
                <div className="mt-2 px-3 py-2 rounded-lg bg-[#FAF8F3] border border-[#EAE5D9]">
                  <p className="text-[11px] leading-relaxed">
                    <span className="font-semibold text-[#B9924F]">{linkedProduct.brand || "—"}</span>
                    <span className="text-[#C1BBAA] mx-1.5">—</span>
                    <span className="font-medium text-[#242320]">{linkedProduct.name}</span>
                    {linkedProduct.description && <><span className="text-[#C1BBAA] mx-1.5">—</span><span className="text-[#8A8377]">{linkedProduct.description}</span></>}
                  </p>
                </div>
              )}
            </div>
          </div>
        ); })()}

        {/* PDF preview — uses PDF.js rendered via canvas (works in sandboxed iframes) */}
        {pdfPreviewUrl && (() => {
          const linkedProduct = pdfPreviewItem ? findLinkedProduct(pdfPreviewItem, products) : null;
          return (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[60] p-6" onClick={() => { setPdfPreviewUrl(null); }}>
            <div className="bg-white rounded-2xl overflow-hidden flex flex-col" style={{ width: "min(90vw, 720px)", height: "min(85vh, 820px)" }} onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-between px-4 py-3 border-b border-[#EAE5D9] shrink-0">
                <p className="text-[13px] font-medium text-[#3F3B34]">PDF Preview</p>
                <div className="flex items-center gap-2">
                  <a href={pdfPreviewUrl} download="document.pdf" className="flex items-center gap-1.5 text-[11px] font-medium text-[#5B564C] border border-[#E0DACB] rounded-lg px-2.5 py-1 hover:bg-[#FAF8F3]">
                    <Download size={11} /> Download
                  </a>
                  <button onClick={() => setPdfPreviewUrl(null)} className="text-[#C1BBAA] hover:text-[#242320]"><X size={16} /></button>
                </div>
              </div>
              <div style={{ flex: "1 1 auto", minHeight: 0, overflow: "hidden", display: "flex" }}>
                <PdfJsViewer src={pdfPreviewUrl} />
              </div>
              {linkedProduct && (
                <div className="px-4 py-2 border-t border-[#EAE5D9] shrink-0 bg-[#FAF8F3]">
                  <p className="text-[11px] leading-relaxed">
                    <span className="font-semibold text-[#B9924F]">{linkedProduct.brand || "—"}</span>
                    <span className="text-[#C1BBAA] mx-1.5">—</span>
                    <span className="font-medium text-[#242320]">{linkedProduct.name}</span>
                    {linkedProduct.description && <><span className="text-[#C1BBAA] mx-1.5">—</span><span className="text-[#8A8377]">{linkedProduct.description}</span></>}
                  </p>
                </div>
              )}
            </div>
          </div>
        ); })()}

        {/* Video preview modal */}
        {videoPreview && (() => {
          const linkedProduct = findLinkedProduct(videoPreview.item, products);
          return (
          <div className="fixed inset-0 bg-black/75 flex items-center justify-center z-[60] p-6" onClick={() => setVideoPreview(null)}>
            <div className="bg-black rounded-2xl overflow-hidden w-full flex flex-col" style={{ maxWidth: "720px", maxHeight: "90vh" }} onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-between px-4 py-2.5 shrink-0">
                <p className="text-white/70 text-[12px] truncate">{videoPreview.item.title || videoPreview.item.fileName || "Video"}</p>
                <button onClick={() => setVideoPreview(null)} className="text-white/50 hover:text-white"><X size={15} /></button>
              </div>
              <video
                src={videoPreview.src}
                controls
                autoPlay={false}
                style={{ maxHeight: "68vh", width: "100%" }}
              />
              {linkedProduct && (
                <div className="px-4 py-2 bg-[#1A1A1A] shrink-0">
                  <p className="text-[11px] leading-relaxed">
                    <span className="font-semibold text-[#D9B26B]">{linkedProduct.brand || "—"}</span>
                    <span className="text-white/30 mx-1.5">—</span>
                    <span className="font-medium text-white/90">{linkedProduct.name}</span>
                    {linkedProduct.description && <><span className="text-white/30 mx-1.5">—</span><span className="text-white/60">{linkedProduct.description}</span></>}
                  </p>
                </div>
              )}
            </div>
          </div>
        ); })()}

        {/* AI context: highlighted media info */}
        {(highlightedIds?.size > 0) && (
          <div className="mb-3 flex items-center gap-2 px-3 py-2 rounded-lg bg-[#FDEEEC] border border-[#C0392B]">
            <span className="text-[11px] text-[#8E241A]">
              ◈ <strong>{highlightedIds.size}</strong> item{highlightedIds.size > 1 ? "s" : ""} highlighted — AI panels include these as context.
            </span>
          </div>
        )}

        {/* PDF AI chat panel */}
        {pdfAiItem && (
          <PdfAiPanel
            item={pdfAiItem.item}
            base64={pdfAiItem.base64}
            onClose={() => setPdfAiItem(null)}
          />
        )}

        {/* Big image preview — opened by a single click on a thumbnail */}
        {previewId && (() => {
          const item = mediaIndex.find((m) => m.id === previewId);
          if (!item) return null;
          const isImage = item.kind === "image";
          const src = isImage ? mediaBlobs[item.id] || item.url : null;
          const linkedProduct = findLinkedProduct(item, products);
          return (
            <div
              className="fixed inset-0 bg-black/55 flex items-center justify-center z-[60] p-6"
              onClick={() => setPreviewId(null)}
            >
              <div
                className="bg-white rounded-2xl w-full max-w-2xl flex flex-col overflow-hidden"
                style={{ maxHeight: "90vh" }}
                onClick={(e) => e.stopPropagation()}
              >
                <div className="flex items-center justify-between px-4 py-3 border-b border-[#EAE5D9] shrink-0">
                  <div className="min-w-0">
                    <p className="text-[13px] font-medium text-[#3F3B34] truncate">{item.title || "Untitled"}</p>
                    <p className="text-[10px] text-[#C1BBAA]">{item.code || "-----"}</p>
                  </div>
                  <button onClick={() => setPreviewId(null)} className="text-[#C1BBAA] hover:text-[#242320] shrink-0 ml-2">
                    <X size={16} />
                  </button>
                </div>
                <div className="bg-[#F3F1EA] flex items-center justify-center" style={{ flex: "1 1 auto", minHeight: 0, overflow: "hidden" }}>
                  {isImage && src ? (
                    <img src={src} alt={item.title || "media"} draggable onDragStart={(e) => handleImageDragStart(e, item, src)} className="max-w-full max-h-full object-contain cursor-grab active:cursor-grabbing" />
                  ) : (
                    <div className="py-14 text-[#C1BBAA]">{mediaIconFor(item.kind, 32)}</div>
                  )}
                </div>
                <div className="px-4 py-3 space-y-1.5 shrink-0">
                  {item.url && (
                    <a
                      href={item.url}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="block text-[12.5px] text-[#B9924F] hover:text-[#8F6B2E] underline break-all"
                    >
                      {item.url}
                    </a>
                  )}
                  {(item.type || item.source) && (
                    <p className="text-[11px] text-[#B4AF9F]">
                      {item.type}{item.type && item.source ? " · " : ""}{item.source}
                    </p>
                  )}
                </div>
                {linkedProduct && (
                  <div className="px-4 py-2 border-t border-[#EAE5D9] shrink-0 bg-[#FAF8F3]">
                    <p className="text-[11px] leading-relaxed">
                      <span className="font-semibold text-[#B9924F]">{linkedProduct.brand || "—"}</span>
                      <span className="text-[#C1BBAA] mx-1.5">—</span>
                      <span className="font-medium text-[#242320]">{linkedProduct.name}</span>
                      {linkedProduct.description && <><span className="text-[#C1BBAA] mx-1.5">—</span><span className="text-[#8A8377]">{linkedProduct.description}</span></>}
                    </p>
                  </div>
                )}
              </div>
            </div>
          );
        })()}

      <p className="text-[11px] text-[#B4AF9F] pt-2 border-t border-[#EAE5D9] leading-relaxed">
        Single Click to Preview - Double Click to Edit
      </p>
    </div>
  );
}

function PlaceholderTab({ label }) {
  return (
    <div className="text-center py-14 text-[#C1BBAA]">
      <p className="text-sm">{label} fields haven't been defined yet.</p>
      <p className="text-xs mt-1">Tell me what to add here and I'll build it out.</p>
    </div>
  );
}


const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(ProductCatalogApp));

</script>
</body>
</html>
